<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badran CNC - نظام إدارة المبيعات المتزامن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --accent: #f59e0b;
  --accent-dark: #d97706;
  --green: #10b981;
  --blue: #3b82f6;
  --danger: #ef4444;
  --text: #1e293b;
  --muted: #64748b;
  --warning: #f59e0b;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  direction:rtl;
  min-height:100vh;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 200px;
  height: 200px;
  background-image: url('logo-badran.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: bottom left;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: "Badran CNC";
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 40px;
  font-weight: 900;
  color: rgba(0,0,0,0.03);
  pointer-events: none;
  z-index: 0;
  font-family: monospace;
  white-space: nowrap;
}
@media (max-width: 768px) {
  body::after { font-size: 24px; }
  body::before { width: 120px; height: 120px; }
}
/* شاشة تسجيل الدخول */
#loginScreen {
  position:fixed; inset:0; background:linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:var(--surface); border-radius:32px;
  padding:50px 40px; width:400px; text-align:center;
  box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.02);
  border:1px solid rgba(0,0,0,0.05);
}
.login-box h1 { font-size:2rem; font-weight:900; background: linear-gradient(135deg, #f59e0b, #d97706); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
.login-box .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; }
.login-box input { width:100%; padding:14px; margin:10px 0; background:#f8fafc; border:1px solid var(--border); border-radius:16px; color:var(--text); font-size:1rem; transition:0.2s; }
.login-box input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(245,158,11,0.2); }
.login-box button { width:100%; padding:14px; background:var(--accent); border:none; border-radius:16px; font-weight:700; cursor:pointer; color:#fff; font-size:1rem; transition:0.2s; margin-top:10px; }
.login-box button:hover { background:var(--accent-dark); transform:translateY(-1px); }
.login-err { color:var(--danger); margin-top:15px; font-size:0.85rem; }
/* الواجهة الرئيسية */
#app { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 24px; height:70px; display:flex; align-items:center; justify-content:space-between;
  box-shadow: var(--shadow);
}
.topbar-left { display:flex; align-items:center; gap:15px; }
.company-logo { display:flex; align-items:center; gap:10px; background:#f8fafc; padding:6px 16px; border-radius:40px; border:1px solid var(--border); }
.company-logo img { width: 36px; height: 36px; object-fit: contain; }
.company-logo span { font-weight: 800; font-size: 1.2rem; background: linear-gradient(135deg, #1e293b, #334155); -webkit-background-clip: text; background-clip: text; color: transparent; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.badge-role { padding:6px 14px; border-radius:30px; background:rgba(245,158,11,0.12); color:var(--accent-dark); font-weight:600; }
.sync-status { font-size:0.75rem; color:var(--green); background:#ecfdf5; padding:4px 10px; border-radius:30px; }
.btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:8px 18px; border-radius:30px; cursor:pointer; transition:0.2s; }
.btn-logout:hover { background:#f1f5f9; }
.navtabs {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; gap:6px; padding:12px 24px; overflow-x:auto;
}
.navtab {
  padding:8px 24px; border-radius:40px; cursor:pointer; font-weight:600; color:var(--muted); background:transparent;
  transition:0.2s; white-space:nowrap;
}
.navtab.active { background:var(--accent); color:#fff; }
.content { flex:1; padding:24px; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:20px; text-align:center; box-shadow: var(--shadow); }
.stat-card .stat-val { font-size:1.8rem; font-weight:900; margin:6px 0 4px; background:linear-gradient(135deg, #f59e0b, #d97706); -webkit-background-clip:text; background-clip:text; color:transparent; }
.stat-card .stat-lbl { color:var(--muted); font-size:.85rem; }
.section { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:24px; margin-bottom:24px; box-shadow: var(--shadow); }
.section-title { font-size:1.1rem; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px; border-right:3px solid var(--accent); padding-right:12px; }
.form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:16px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group label { font-size:.85rem; color:var(--muted); font-weight:500; }
.form-group input, .form-group select { padding:12px 16px; background:#f8fafc; border:1px solid var(--border); border-radius:16px; color:var(--text); outline:none; transition:0.2s; }
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }
.btn { padding:12px 28px; border-radius:40px; font-weight:700; cursor:pointer; border:none; transition:0.2s; font-size:0.9rem; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-dark); transform:translateY(-2px); }
.btn-success { background:var(--green); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-info { background:var(--blue); color:#fff; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-sm { padding:6px 16px; font-size:.75rem; border-radius:30px; }
.btn-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
.tbl-wrap { overflow-x:auto; border-radius:20px; }
table { width:100%; border-collapse:collapse; font-size:.9rem; }
th { background:#f8fafc; padding:14px; text-align:right; border-bottom:2px solid var(--border); font-weight:700; }
td { padding:14px; border-bottom:1px solid var(--border); }
.tag-red { color:var(--danger); font-weight:600; }
.empty-state { text-align:center; padding:60px; color:var(--muted); }
.badge-warning { background:rgba(245,158,11,0.12); color:var(--warning); padding:4px 12px; border-radius:30px; font-size:0.7rem; font-weight:bold; margin-right:8px; }
.inv-item-row { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:12px; margin-bottom:12px; align-items:center; background:#f8fafc; padding:12px; border-radius:16px; }
.inv-total-box { background:#f8fafc; border-radius:20px; padding:16px 24px; display:flex; justify-content:flex-end; gap:30px; align-items:center; margin-top:20px; }
.inv-total-box .val { font-size:1.5rem; font-weight:900; color:var(--accent); }
.print-invoice { padding: 16px; background: white; direction: rtl; font-family: 'Cairo', sans-serif; }
.print-invoice h2 { color: #f59e0b; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <h1>BADRAN CNC</h1>
    <div class="sub">نظام إدارة المبيعات المتزامن</div>
    <input type="text" id="loginUsername" placeholder="اسم المستخدم">
    <input type="password" id="loginPass" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()">دخول</button>
    <div id="loginError" class="login-err"></div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="company-logo">
        <img src="logo-badran.png" alt="Badran CNC" onerror="this.style.display='none'">
        <span>Badran CNC</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="badge-role" id="userRoleBadge"></span>
      <span class="sync-status" id="syncStatus">🔄 متزامن</span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="navtabs" id="navTabs"></div>
  <div class="content" id="contentArea"></div>
</div>
<script>
// ===================== البيانات والتزامن =====================
let currentUser = null;
let products = [], invoices = [], returns = [];
const LOW_STOCK_THRESHOLD = 20;

function loadData() {
  let stored = localStorage.getItem('axon_sync_data');
  if(stored) {
    try {
      let data = JSON.parse(stored);
      products = data.products || [];
      invoices = data.invoices || [];
      returns = data.returns || [];
    } catch(e) {}
  }
  if(!products.length) {
    products = [
      { id: 1, name: "سبندل 2.2 كيلو", sellPrice: 4500, buyPrice: 3200, stock: 10 },
      { id: 2, name: "كنترولر Mach3", sellPrice: 1250, buyPrice: 800, stock: 15 },
      { id: 3, name: "موتور Nema23", sellPrice: 890, buyPrice: 550, stock: 25 },
      { id: 4, name: "دراع روبوت", sellPrice: 3200, buyPrice: 2100, stock: 5 },
      { id: 5, name: "سيرفو 1.5kw", sellPrice: 2850, buyPrice: 1900, stock: 18 }
    ];
  }
  invoices = invoices.length ? invoices : [];
  returns = returns.length ? returns : [];
}
function saveAllData() {
  localStorage.setItem('axon_sync_data', JSON.stringify({ products, invoices, returns, lastUpdate: Date.now() }));
  localStorage.setItem('axon_broadcast', JSON.stringify({ type: 'sync', time: Date.now() }));
  setTimeout(() => localStorage.removeItem('axon_broadcast'), 100);
}
function saveProducts() { saveAllData(); broadcastUpdate('products'); }
function saveInvoices() { saveAllData(); broadcastUpdate('invoices'); }
function saveReturns() { saveAllData(); broadcastUpdate('returns'); }
function broadcastUpdate(type) {
  localStorage.setItem('axon_broadcast', JSON.stringify({ type, time: Date.now() }));
  setTimeout(() => localStorage.removeItem('axon_broadcast'), 100);
}
window.addEventListener('storage', function(e) {
  if(e.key === 'axon_broadcast') {
    let newData = localStorage.getItem('axon_sync_data');
    if(newData) {
      let data = JSON.parse(newData);
      products = data.products;
      invoices = data.invoices;
      returns = data.returns;
      refreshCurrentView();
      let syncMsg = document.getElementById('syncStatus');
      if(syncMsg) { syncMsg.innerHTML = '✅ تم التحديث'; setTimeout(() => { if(syncMsg) syncMsg.innerHTML = '🔄 متزامن'; }, 2000); }
    }
  }
});
function refreshCurrentView() {
  let active = document.querySelector('.navtab.active');
  if(active) {
    let txt = active.innerText;
    if(txt.includes('الرئيسية')) renderDashboard();
    else if(txt.includes('المنتجات')) renderProductsPage();
    else if(txt.includes('البيع')) renderSalesPage();
    else if(txt.includes('الفواتير')) renderInvoicesPage();
    else if(txt.includes('المرتجعات')) renderReturnsPage();
    else if(txt.includes('الإيرادات')) renderRevenuePage();
    else if(txt.includes('النواقص')) renderShortagesPage();
  }
}

// ===================== دوال PDF =====================
async function printInvoiceAsPDF(invoice) {
  const { jsPDF } = window.jspdf;
  const element = document.createElement('div');
  element.className = 'print-invoice';
  element.innerHTML = `
    <div style="text-align:center; margin-bottom:20px;">
      <h2>Badran CNC</h2>
      <p>نظام إدارة المبيعات</p>
      <p>${new Date().toLocaleString('ar-EG')}</p>
    </div>
    <div><strong>رقم الفاتورة:</strong> ${invoice.id}</div>
    <div><strong>العميل:</strong> ${invoice.customer}</div>
    <div><strong>التاريخ:</strong> ${invoice.date}</div>
    <table border="1" cellpadding="5" style="width:100%; border-collapse:collapse; margin:15px 0;">
      <thead><tr><th>المنتج</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr></thead>
      <tbody>${invoice.items.map(i => `<tr><td>${i.name}</td><td>${i.quantity}</td><td>${i.sellPrice} ج</td><td>${i.total} ج</td></tr>`).join('')}</tbody>
    </table>
    <div style="text-align:left; font-size:1.2rem;"><strong>الإجمالي النهائي: ${invoice.total} ج</strong></div>
    <div style="margin-top:20px; text-align:center;">شكراً لتسوقكم مع Badran CNC</div>
  `;
  document.body.appendChild(element);
  try {
    const canvas = await html2canvas(element, { scale: 2, logging: false });
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    const imgWidth = 190;
    const pageHeight = 297;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    let position = 10;
    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
    pdf.save(`فاتورة_${invoice.id}.pdf`);
  } catch(err) { alert('حدث خطأ أثناء إنشاء PDF'); }
  document.body.removeChild(element);
}
async function printShortagesPDF() {
  const low = products.filter(p => p.stock < LOW_STOCK_THRESHOLD);
  if(!low.length) return alert('لا توجد منتجات ناقصة');
  const { jsPDF } = window.jspdf;
  const element = document.createElement('div');
  element.className = 'print-invoice';
  element.innerHTML = `
    <div style="text-align:center;">
      <h2>Badran CNC</h2>
      <h3>تقرير المنتجات الناقصة</h3>
      <p>الحد الأدنى: ${LOW_STOCK_THRESHOLD} قطعة</p>
      <p>التاريخ: ${new Date().toLocaleString('ar-EG')}</p>
    </div>
    <table border="1" cellpadding="5" style="width:100%; margin-top:15px;">
      <thead><tr><th>#</th><th>المنتج</th><th>الرصيد الحالي</th><th>سعر الشراء</th><th>سعر البيع</th></tr></thead>
      <tbody>${low.map((p,i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.stock}</td><td>${p.buyPrice} ج</td><td>${p.sellPrice} ج</td></tr>`).join('')}</tbody>
    </table>
  `;
  document.body.appendChild(element);
  try {
    const canvas = await html2canvas(element, { scale: 2 });
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
    const imgWidth = 190;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
    pdf.save(`تقرير_النواقص_${Date.now()}.pdf`);
  } catch(err) { alert('خطأ في إنشاء PDF'); }
  document.body.removeChild(element);
}

// ===================== تسجيل الدخول =====================
function checkLogin() {
  let username = document.getElementById('loginUsername').value.trim();
  let password = document.getElementById('loginPass').value;
  if(!username) { showError('ادخل اسم المستخدم'); return; }
  if((username.toLowerCase() === 'badran cnc' || username.toLowerCase() === 'badran') && password === 'admin123') {
    currentUser = { role: 'admin', name: 'Badran CNC (أدمن)' };
    startApp();
  } else if(password === '1234' && username.trim() !== '') {
    currentUser = { role: 'user', name: username };
    startApp();
  } else {
    showError('اسم المستخدم أو كلمة السر غير صحيحة');
  }
}
function showError(msg) {
  let errDiv = document.getElementById('loginError');
  errDiv.innerText = msg;
  setTimeout(() => errDiv.innerText = '', 3000);
  document.getElementById('loginPass').value = '';
}
function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
  renderTabs();
  renderDashboard();
}
function logout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPass').value = '';
}
function renderTabs() {
  let tabs = [
    { id: 'dashboard', name: '📊 الرئيسية' },
    { id: 'products', name: '📦 المنتجات' },
    { id: 'sales', name: '🛒 البيع' },
    { id: 'invoices', name: '📄 الفواتير' },
    { id: 'returns', name: '🔄 المرتجعات' },
    { id: 'revenue', name: '💰 الإيرادات' }
  ];
  if(currentUser.role === 'admin') tabs.push({ id: 'shortages', name: '⚠️ النواقص' });
  let html = '';
  tabs.forEach(tab => { html += `<button class="navtab" onclick="switchTab('${tab.id}')">${tab.name}</button>`; });
  document.getElementById('navTabs').innerHTML = html;
  document.querySelectorAll('.navtab')[0].classList.add('active');
}
function switchTab(tabId) {
  document.querySelectorAll('.navtab').forEach(btn => btn.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');
  if(tabId === 'dashboard') renderDashboard();
  else if(tabId === 'products') renderProductsPage();
  else if(tabId === 'sales') renderSalesPage();
  else if(tabId === 'invoices') renderInvoicesPage();
  else if(tabId === 'returns') renderReturnsPage();
  else if(tabId === 'revenue') renderRevenuePage();
  else if(tabId === 'shortages') renderShortagesPage();
}
function getLowStockProducts() { return products.filter(p => p.stock < LOW_STOCK_THRESHOLD); }
function renderShortagesPage() {
  let low = getLowStockProducts();
  let html = `<div class="section"><div class="section-title">⚠️ المنتجات الناقصة (أقل من ${LOW_STOCK_THRESHOLD})</div><div class="tbl-wrap"><table><thead><tr><th>#</th><th>المنتج</th><th>الرصيد</th><th>الحد</th><th>سعر الشراء</th><th>سعر البيع</th></tr></thead><tbody id="shortList"></tbody></table></div><div class="btn-row"><button class="btn btn-warning" onclick="printShortagesPDF()">🖨️ طباعة PDF</button></div></div>`;
  document.getElementById('contentArea').innerHTML = html;
  let tbody = document.getElementById('shortList');
  if(!low.length) tbody.innerHTML = '<tr><td colspan="6" class="empty-state">✅ لا توجد نواقص</td></tr>';
  else low.forEach((p,i) => { tbody.innerHTML += `<tr><td>${i+1}</td><td>${p.name}</td><td class="tag-red">${p.stock}</td><td>${LOW_STOCK_THRESHOLD}</td><td>${p.buyPrice} ج</td><td>${p.sellPrice} ج</td></tr>`; });
}
function renderDashboard() {
  let totalStock = products.reduce((s,p)=>s+p.stock,0);
  let totalSales = invoices.reduce((s,i)=>s+i.total,0);
  let totalReturns = returns.reduce((s,r)=>s+r.total,0);
  let net = totalSales - totalReturns;
  let lowCount = getLowStockProducts().length;
  let lowCard = (currentUser.role === 'admin' && lowCount>0) ? `<div class="stat-card"><div class="stat-lbl">⚠️ نواقص</div><div class="stat-val" style="color:var(--warning)">${lowCount}</div><div class="stat-lbl">أقل من ${LOW_STOCK_THRESHOLD}</div></div>` : '';
  let html = `<div class="stat-grid"><div class="stat-card"><div class="stat-lbl">المنتجات</div><div class="stat-val">${products.length}</div></div><div class="stat-card"><div class="stat-lbl">المخزون</div><div class="stat-val">${totalStock}</div></div><div class="stat-card"><div class="stat-lbl">المبيعات</div><div class="stat-val">${totalSales.toFixed(2)} ج</div></div><div class="stat-card"><div class="stat-lbl">المرتجعات</div><div class="stat-val">${totalReturns.toFixed(2)} ج</div></div><div class="stat-card"><div class="stat-lbl">صافي الإيرادات</div><div class="stat-val">${net.toFixed(2)} ج</div></div>${lowCard}</div><div class="section"><div class="section-title">📋 آخر الفواتير</div>${renderInvoicesTable(invoices.slice(0,5))}</div>`;
  document.getElementById('contentArea').innerHTML = html;
}
function renderInvoicesTable(invList) {
  if(!invList.length) return '<div class="empty-state">لا توجد فواتير</div>';
  let h='<div class="tbl-wrap"></table><thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th></tr></thead><tbody>';
  invList.forEach((inv,i)=>{ h+=`<tr><td>${i+1}</td><td>${inv.customer}</td><td>${inv.date}</td><td>${inv.total} ج</td></tr>`; });
  return h+'</tbody></table></div>';
}
function renderProductsPage() {
  let html = `<div class="section"><div class="section-title">📦 المنتجات</div><div class="form-row"><div class="form-group"><label>🔍 بحث</label><input type="text" id="searchProduct" placeholder="اسم المنتج..."></div></div><div class="tbl-wrap"><table><thead><tr><th>#</th><th>المنتج</th><th>سعر البيع</th>${currentUser.role==='admin'?'<th>سعر الشراء</th>':''}<th>المخزون</th><th></th></tr></thead><tbody id="productsList"></tbody></table></div>${currentUser.role==='admin'?'<div class="btn-row"><button class="btn btn-primary" onclick="openAddProduct()">➕ إضافة منتج</button></div>':''}</div>`;
  document.getElementById('contentArea').innerHTML = html;
  renderProductsList();
  document.getElementById('searchProduct')?.addEventListener('input',()=>renderProductsList());
}
function renderProductsList() {
  let search = document.getElementById('searchProduct')?.value.toLowerCase()||'';
  let filtered = products.filter(p=>p.name.toLowerCase().includes(search));
  let html = '';
  filtered.forEach((p,i)=>{
    let badge = (p.stock<LOW_STOCK_THRESHOLD && currentUser.role==='admin') ? '<span class="badge-warning">ناقص</span>' : '';
    html+=`<tr data-id="${p.id}"><td>${i+1}</td><td>${p.name} ${badge}</td><td>${p.sellPrice} ج</td>${currentUser.role==='admin'?`<td>${p.buyPrice} ج</td>`:''}<td class="${p.stock<LOW_STOCK_THRESHOLD?'tag-red':''}">${p.stock}</td><td>${currentUser.role==='admin'?`<button class="btn-info btn-sm" onclick="editProduct(${p.id})">✏️</button> <button class="btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>`:''}</td></tr>`;
  });
  document.getElementById('productsList').innerHTML = html;
}
function openAddProduct() {
  let n=prompt("اسم المنتج"); if(!n) return;
  let s=parseFloat(prompt("سعر البيع")); let b=parseFloat(prompt("سعر الشراء")); let st=parseInt(prompt("الكمية"));
  if(!isNaN(s) && !isNaN(b)) { products.push({id:Date.now(),name:n,sellPrice:s,buyPrice:b,stock:st||0}); saveProducts(); renderProductsList(); if(currentUser.role==='admin') renderDashboard(); }
}
function editProduct(id) {
  let p=products.find(p=>p.id===id);
  let nn=prompt("الاسم",p.name); let ns=parseFloat(prompt("سعر البيع",p.sellPrice)); let nb=parseFloat(prompt("سعر الشراء",p.buyPrice)); let nst=parseInt(prompt("الكمية",p.stock));
  if(nn) p.name=nn; if(!isNaN(ns)) p.sellPrice=ns; if(!isNaN(nb) && currentUser.role==='admin') p.buyPrice=nb; if(!isNaN(nst)) p.stock=nst;
  saveProducts(); renderProductsList(); if(currentUser.role==='admin') renderDashboard();
}
function deleteProduct(id) { if(confirm("حذف؟")) { products=products.filter(p=>p.id!==id); saveProducts(); renderProductsList(); if(currentUser.role==='admin') renderDashboard(); } }

let currentInvoiceItems = [];
function renderSalesPage() {
  let html = `<div class="section"><div class="section-title">🛒 فاتورة جديدة</div><div class="form-row"><div class="form-group"><label>👤 العميل</label><input type="text" id="customerName"></div></div><div class="form-row"><div class="form-group"><label>المنتج</label><select id="productSelect"></select></div><div class="form-group"><label>سعر مختلف</label><input type="number" id="customPrice" placeholder="اختياري"></div></div><button class="btn btn-primary" onclick="addToInvoice()">➕ أضف</button><div id="invItems"></div><div class="inv-total-box"><div>الإجمالي:</div><div class="val" id="invoiceTotal">0</div></div><div class="btn-row"><button class="btn btn-success" onclick="saveInvoice()">💾 حفظ</button><button class="btn btn-danger" onclick="clearInvoice()">🗑️ مسح</button></div></div>`;
  document.getElementById('contentArea').innerHTML = html;
  renderProductSelect(); renderCurrentInvoice();
}
function renderProductSelect() { let sel=document.getElementById('productSelect'); if(!sel) return; sel.innerHTML='<option value="">-- اختر --</option>'+products.map(p=>`<option value="${p.id}">${p.name} - ${p.sellPrice} ج (المتبقي: ${p.stock})</option>`).join(''); }
function addToInvoice() {
  let pid=document.getElementById('productSelect').value; if(!pid) return alert("اختر منتج");
  let prod=products.find(p=>p.id==pid); if(prod.stock<=0) return alert("غير متوفر");
  let custom=parseFloat(document.getElementById('customPrice').value); let price=!isNaN(custom)&&custom>0?custom:prod.sellPrice;
  let exist=currentInvoiceItems.find(i=>i.productId==pid);
  if(exist) { if(exist.quantity+1>prod.stock) return alert("كمية أكبر من المتوفر"); exist.quantity++; exist.total=exist.quantity*exist.sellPrice; }
  else { currentInvoiceItems.push({productId:prod.id,name:prod.name,sellPrice:price,quantity:1,total:price}); }
  renderCurrentInvoice(); document.getElementById('customPrice').value='';
}
function renderCurrentInvoice() {
  let cont=document.getElementById('invItems'); if(!cont) return;
  let html=''; currentInvoiceItems.forEach((it,i)=>{ html+=`<div class="inv-item-row"><div>${it.name}</div><input type="number" value="${it.sellPrice}" onchange="updatePrice(${i},this.value)" style="width:100px"><div><button class="btn-sm" onclick="changeQty(${i},-1)">-</button> ${it.quantity} <button class="btn-sm" onclick="changeQty(${i},1)">+</button></div><div>${it.total} ج</div><button class="btn-danger btn-sm" onclick="removeItem(${i})">🗑️</button></div>`; });
  cont.innerHTML=html; document.getElementById('invoiceTotal').innerText=currentInvoiceItems.reduce((s,i)=>s+i.total,0);
}
function updatePrice(idx,val) { let p=parseFloat(val); if(!isNaN(p)&&p>0) { currentInvoiceItems[idx].sellPrice=p; currentInvoiceItems[idx].total=currentInvoiceItems[idx].quantity*p; renderCurrentInvoice(); } }
function changeQty(idx,delta) {
  let it=currentInvoiceItems[idx]; let prod=products.find(p=>p.id==it.productId); let nq=it.quantity+delta;
  if(nq<1) { removeItem(idx); return; }
  if(nq>prod.stock) { alert("كمية أكبر من المتوفر"); return; }
  it.quantity=nq; it.total=nq*it.sellPrice; renderCurrentInvoice();
}
function removeItem(idx) { currentInvoiceItems.splice(idx,1); renderCurrentInvoice(); }
function clearInvoice() { currentInvoiceItems=[]; renderCurrentInvoice(); }
async function saveInvoice() {
  let cust = document.getElementById('customerName').value.trim();
  if(!cust) return alert("ادخل اسم العميل");
  if(!currentInvoiceItems.length) return alert("أضف منتجات");
  for(let it of currentInvoiceItems) { let prod = products.find(p=>p.id==it.productId); if(prod.stock < it.quantity) return alert(`الكمية من ${prod.name} غير متوفرة`); prod.stock -= it.quantity; }
  let total = currentInvoiceItems.reduce((s,i)=>s+i.total,0);
  let invoice = { id: Date.now(), customer: cust, date: new Date().toLocaleString('ar-EG'), items: JSON.parse(JSON.stringify(currentInvoiceItems)), total };
  invoices.unshift(invoice);
  saveProducts(); saveInvoices();
  clearInvoice(); document.getElementById('customerName').value = '';
  alert("✅ تم حفظ الفاتورة");
  renderInvoicesPage();
  if(currentUser.role==='admin') renderDashboard();
  await printInvoiceAsPDF(invoice);
}
function renderInvoicesPage() {
  let html = `<div class="section"><div class="section-title">📄 الفواتير</div><div id="invoicesList"></div></div>`;
  document.getElementById('contentArea').innerHTML = html;
  let invHtml = invoices.length ? `<div class="tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th><th>العمليات</th></tr></thead><tbody>${invoices.map((inv,i)=>`<tr><td>${i+1}</td><td>${inv.customer}</td><td>${inv.date}</td><td>${inv.total} ج</td><td><button class="btn-info btn-sm" onclick="viewInvoice(${inv.id})">📋</button> ${currentUser.role==='admin'?`<button class="btn-danger btn-sm" onclick="deleteInvoice(${inv.id})">🗑️</button>`:''} <button class="btn-primary btn-sm" onclick="editInvoice(${inv.id})">✏️</button> <button class="btn-success btn-sm" onclick="printInvoiceAsPDF(invoices.find(i=>i.id===${inv.id}))">🖨️ PDF</button></td></tr>`).join('')}</tbody><table></div>` : '<div class="empty-state">لا توجد فواتير</div>';
  document.getElementById('invoicesList').innerHTML = invHtml;
}
function viewInvoice(id) { let inv=invoices.find(i=>i.id===id); if(inv) alert(`العميل: ${inv.customer}\nالتاريخ: ${inv.date}\n${inv.items.map(i=>`${i.name} - ${i.quantity} × ${i.sellPrice} = ${i.total}`).join('\n')}\nالإجمالي: ${inv.total} ج`); }
function deleteInvoice(id) { if(!confirm("حذف الفاتورة؟")) return; let inv=invoices.find(i=>i.id===id); if(inv){ inv.items.forEach(item=>{ let prod=products.find(p=>p.name===item.name); if(prod) prod.stock+=item.quantity; }); invoices=invoices.filter(i=>i.id!==id); saveProducts(); saveInvoices(); renderInvoicesPage(); if(currentUser.role==='admin') renderDashboard(); alert("تم الحذف"); } }
function editInvoice(id) { let inv=invoices.find(i=>i.id===id); if(!inv) return; let nc=prompt("العميل:",inv.customer); if(nc) inv.customer=nc; for(let i=0;i<inv.items.length;i++){ let it=inv.items[i]; let nq=parseInt(prompt(`الكمية لـ ${it.name}:`,it.quantity)); if(!isNaN(nq) && nq>0){ let prod=products.find(p=>p.name===it.name); if(prod){ let diff=nq-it.quantity; if(diff>0 && prod.stock<diff){ alert("مخزون غير كاف"); return; } prod.stock-=diff; } it.quantity=nq; it.total=nq*it.sellPrice; } } inv.total=inv.items.reduce((s,i)=>s+i.total,0); saveProducts(); saveInvoices(); renderInvoicesPage(); if(currentUser.role==='admin') renderDashboard(); alert("تم التعديل"); }
function renderReturnsPage() {
  let html=`<div class="section"><div class="section-title">🔄 إرجاع</div><div class="form-row"><div class="form-group"><label>اختر الفاتورة</label><select id="retInvoiceSelect"></select></div></div><button class="btn btn-primary" onclick="loadReturnInvoice()">عرض</button><div id="returnItemsArea"></div><button class="btn btn-success" onclick="processReturn()" style="margin-top:12px;">تأكيد الإرجاع</button></div><div class="section"><div class="section-title">📋 سجل المرتجعات</div><div id="returnsHistory"></div></div>`;
  document.getElementById('contentArea').innerHTML=html;
  let sel=document.getElementById('retInvoiceSelect'); if(sel) sel.innerHTML='<option value="">-- اختر --</option>'+invoices.map(inv=>`<option value="${inv.id}">فاتورة #${inv.id} - ${inv.customer}</option>`).join('');
  renderReturnsHistory();
}
function loadReturnInvoice() {
  let id=document.getElementById('retInvoiceSelect').value; if(!id) return alert("اختر"); let inv=invoices.find(i=>i.id==id); if(!inv) return;
  let html=`<div class="tbl-wrap"><table><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>كمية الإرجاع</th></tr></thead><tbody>`;
  inv.items.forEach((it,i)=>{ html+=`<tr><td>${it.name}</td><td>${it.quantity}</td><td>${it.sellPrice} ج</td><td><input type="number" id="retQty${i}" min="0" max="${it.quantity}" value="0" style="width:80px;"></td></tr>`; });
  html+=`</tbody></table><input type="hidden" id="returnInvId" value="${inv.id}">`; document.getElementById('returnItemsArea').innerHTML=html;
}
function processReturn() {
  let invId=document.getElementById('returnInvId')?.value; if(!invId) return alert("اختر فاتورة"); let inv=invoices.find(i=>i.id==invId); if(!inv) return;
  let returned=[]; let total=0;
  for(let i=0;i<inv.items.length;i++){ let qty=parseInt(document.getElementById(`retQty${i}`)?.value||0); if(qty>0){ let prod=products.find(p=>p.name===inv.items[i].name); if(prod) prod.stock+=qty; returned.push({name:inv.items[i].name, quantity:qty, price:inv.items[i].sellPrice, total:qty*inv.items[i].sellPrice}); total+=qty*inv.items[i].sellPrice; } }
  if(!returned.length) return alert("لم تختر شيئاً");
  returns.unshift({id:Date.now(), invoiceId:invId, date:new Date().toLocaleString('ar-EG'), items:returned, total});
  saveProducts(); saveReturns(); renderReturnsHistory(); if(currentUser.role==='admin') renderDashboard();
  alert(`تم الإرجاع بقيمة ${total} ج`); document.getElementById('returnItemsArea').innerHTML='';
  let sel=document.getElementById('retInvoiceSelect'); if(sel) sel.innerHTML='<option value="">-- اختر --</option>'+invoices.map(inv=>`<option value="${inv.id}">فاتورة #${inv.id} - ${inv.customer}</option>`).join('');
}
function renderReturnsHistory() {
  let c=document.getElementById('returnsHistory'); if(!c) return;
  if(!returns.length){ c.innerHTML='<div class="empty-state">لا توجد مرتجعات</div>'; return; }
  let html='<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>الفاتورة</th><th>المنتجات</th><th>الإجمالي</th></tr></thead><tbody>';
  returns.forEach(r=>{ html+=`<tr><td>${r.date}</td><td>#${r.invoiceId}</td><td>${r.items.map(i=>`${i.name} x${i.quantity}`).join(', ')}</td><td>${r.total} ج</td></tr>`; });
  html+='</tbody></table></div>'; c.innerHTML=html;
}
function renderRevenuePage() {
  let today=new Date().toISOString().split('T')[0]; let todayTotal=0,monthTotal=0,allTotal=0,now=new Date(),monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  invoices.forEach(inv=>{ let d=inv.date.split(' ')[0]; allTotal+=inv.total; if(d===today) todayTotal+=inv.total; if(new Date(d)>=monthStart) monthTotal+=inv.total; });
  let retTotal=returns.reduce((s,r)=>s+r.total,0);
  let html=`<div class="stat-grid"><div class="stat-card"><div class="stat-lbl">اليوم</div><div class="stat-val">${todayTotal.toFixed(2)} ج</div></div><div class="stat-card"><div class="stat-lbl">هذا الشهر</div><div class="stat-val">${monthTotal.toFixed(2)} ج</div></div><div class="stat-card"><div class="stat-lbl">الإجمالي</div><div class="stat-val">${allTotal.toFixed(2)} ج</div></div><div class="stat-card"><div class="stat-lbl">المرتجعات</div><div class="stat-val">${retTotal.toFixed(2)} ج</div></div><div class="stat-card"><div class="stat-lbl">صافي الإيرادات</div><div class="stat-val">${(allTotal-retTotal).toFixed(2)} ج</div></div></div><div class="section"><div class="section-title">📊 جميع الفواتير</div>${renderInvoicesTable(invoices)}</div>`;
  document.getElementById('contentArea').innerHTML = html;
}
</script>
</body>
</html>
