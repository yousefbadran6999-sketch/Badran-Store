<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXON - نظام إدارة المبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f17;
  --surface: #16161f;
  --card: #1e1e2e;
  --border: #2a2a3e;
  --accent: #f39c12;
  --green: #2ecc71;
  --blue: #3498db;
  --danger: #e74c3c;
  --text: #e8e8f0;
  --muted: #7f8c9a;
  --warning: #e67e22;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); direction:rtl; min-height:100vh; }

/* Login */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:50px 40px; width:360px; text-align:center;
}
.login-box h1 { font-size:2.5rem; font-weight:900; color:var(--accent); }
.login-box input {
  width:100%; padding:14px; margin:10px 0; background:var(--surface);
  border:1px solid var(--border); border-radius:10px; color:var(--text); text-align:center;
}
.login-box button {
  width:100%; padding:14px; background:var(--accent);
  border:none; border-radius:10px; font-weight:700; cursor:pointer; color:#111;
}
.login-err { color:var(--danger); margin-top:10px; }

/* Main */
#app { display:none; flex-direction:column; min-height:100vh; }
.topbar {
  background:var(--card); border-bottom:1px solid var(--border);
  padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between;
}
.topbar-logo { font-size:1.4rem; font-weight:900; color:var(--accent); }
.badge-role { padding:4px 12px; border-radius:20px; background:rgba(243,156,18,.15); color:var(--accent); }
.btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:8px; cursor:pointer; }
.navtabs {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; gap:4px; padding:8px 24px; overflow-x:auto;
}
.navtab {
  padding:8px 18px; border-radius:8px; cursor:pointer; font-weight:600; color:var(--muted); background:transparent;
}
.navtab.active { background:var(--accent); color:#111; }
.content { flex:1; padding:24px; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:20px; text-align:center;
}
.stat-card .stat-val { font-size:1.6rem; font-weight:900; margin:6px 0 4px; }
.stat-card .stat-lbl { color:var(--muted); font-size:.85rem; }
.section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
.section-title { font-size:1rem; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group label { font-size:.82rem; color:var(--muted); }
.form-group input, .form-group select {
  padding:10px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); outline:none;
}
.btn { padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; border:none; }
.btn-primary { background:var(--accent); color:#111; }
.btn-success { background:var(--green); color:#111; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-info { background:var(--blue); color:#fff; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-sm { padding:5px 12px; font-size:.8rem; }
.btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.88rem; }
th { background:var(--surface); padding:10px; text-align:right; border-bottom:2px solid var(--border); }
td { padding:10px; border-bottom:1px solid var(--border); }
.tag-green { color:var(--green); }
.tag-red { color:var(--danger); }
.tag-warning { color:var(--warning); }
.inv-item-row {
  display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:8px;
  margin-bottom:8px; align-items:center;
}
.inv-total-box {
  background:var(--surface); border-radius:10px; padding:14px 18px;
  display:flex; justify-content:flex-end; gap:30px; align-items:center;
}
.inv-total-box .val { font-size:1.2rem; font-weight:900; color:var(--accent); }
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:flex; align-items:center; justify-content:center; z-index:500;
  opacity:0; pointer-events:none; transition:.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:28px; width:min(680px,95vw); max-height:90vh; overflow-y:auto;
}
.modal-header { display:flex; justify-content:space-between; margin-bottom:20px; }
.modal-close { background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; }
.empty-state { text-align:center; padding:50px; color:var(--muted); }
.badge-warning {
  background:rgba(230,126,34,0.2); color:var(--warning); padding:2px 8px; border-radius:12px;
  font-size:0.7rem; font-weight:bold; margin-right:8px;
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>AXON</h1>
    <p>نظام إدارة المبيعات</p>
    <input type="password" id="loginPass" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()">دخول</button>
    <div id="loginError" class="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">🔷 AXON</div>
    <div><span class="badge-role" id="userRoleBadge"></span>
    <button class="btn-logout" onclick="logout()" style="margin-right:10px;">خروج</button></div>
  </div>
  <div class="navtabs" id="navTabs"></div>
  <div class="content" id="contentArea"></div>
</div>

<script>
let currentUser = null; // 'admin' or 'user'
let products = [];
let invoices = [];
let returns = [];
const LOW_STOCK_THRESHOLD = 20;

function loadData() {
  products = JSON.parse(localStorage.getItem('axon_products')) || [
    { id: 1, name: "سبندل 2.2 كيلو", sellPrice: 4500, buyPrice: 3200, stock: 10 },
    { id: 2, name: "كنترولر Mach3", sellPrice: 1250, buyPrice: 800, stock: 15 },
    { id: 3, name: "موتور Nema23", sellPrice: 890, buyPrice: 550, stock: 25 },
    { id: 4, name: "دراع روبوت", sellPrice: 3200, buyPrice: 2100, stock: 5 },
    { id: 5, name: "سيرفو 1.5kw", sellPrice: 2850, buyPrice: 1900, stock: 18 }
  ];
  invoices = JSON.parse(localStorage.getItem('axon_invoices')) || [];
  returns = JSON.parse(localStorage.getItem('axon_returns')) || [];
}
function saveProducts() { localStorage.setItem('axon_products', JSON.stringify(products)); }
function saveInvoices() { localStorage.setItem('axon_invoices', JSON.stringify(invoices)); }
function saveReturns() { localStorage.setItem('axon_returns', JSON.stringify(returns)); }

function checkLogin() {
  let pass = document.getElementById('loginPass').value;
  if (pass === 'admin123') {
    currentUser = 'admin';
    document.getElementById('userRoleBadge').innerHTML = '👑 أدمن';
    startApp();
  } else if (pass === '1234') {
    currentUser = 'user';
    document.getElementById('userRoleBadge').innerHTML = '👤 مستخدم';
    startApp();
  } else {
    document.getElementById('loginError').innerText = '❌ كلمة سر خاطئة';
    document.getElementById('loginPass').value = '';
  }
}

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
  renderTabs();
  renderDashboard();
}

function logout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function renderTabs() {
  let tabs = [
    { id: 'dashboard', name: '📊 الرئيسية' },
    { id: 'products', name: '📦 المنتجات' },
    { id: 'sales', name: '🛒 البيع' },
    { id: 'invoices', name: '📄 الفواتير' },
    { id: 'returns', name: '🔄 المرتجعات' },
    { id: 'revenue', name: '💰 الإيرادات' }
  ];
  
  // قائمة النواقص تظهر فقط للأدمن
  if (currentUser === 'admin') {
    tabs.push({ id: 'shortages', name: '⚠️ النواقص' });
  }
  
  let html = '';
  tabs.forEach(tab => {
    html += `<button class="navtab" onclick="switchTab('${tab.id}')">${tab.name}</button>`;
  });
  document.getElementById('navTabs').innerHTML = html;
  document.querySelectorAll('.navtab')[0].classList.add('active');
}

function switchTab(tabId) {
  document.querySelectorAll('.navtab').forEach(btn => btn.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  else document.querySelector(`.navtab[onclick*="${tabId}"]`).classList.add('active');
  
  if (tabId === 'dashboard') renderDashboard();
  else if (tabId === 'products') renderProductsPage();
  else if (tabId === 'sales') renderSalesPage();
  else if (tabId === 'invoices') renderInvoicesPage();
  else if (tabId === 'returns') renderReturnsPage();
  else if (tabId === 'revenue') renderRevenuePage();
  else if (tabId === 'shortages') renderShortagesPage();
}

// عرض سعر الشراء بـ F4
document.addEventListener('keydown', function(e) {
  if (e.key === 'F4') {
    let row = document.querySelector('#productsList tr:hover');
    if (row && row.dataset.id) {
      let product = products.find(p => p.id == row.dataset.id);
      if (product) alert(`💰 سعر شراء ${product.name}: ${product.buyPrice} جنيه`);
    } else if (currentUser === 'admin') {
      alert("ضع الماوس على منتج ثم اضغط F4");
    }
  }
});

// دالة للحصول على المنتجات الناقصة (الرصيد أقل من 20)
function getLowStockProducts() {
  return products.filter(p => p.stock < LOW_STOCK_THRESHOLD).sort((a,b) => a.stock - b.stock);
}

// صفحة النواقص (تظهر فقط للأدمن)
function renderShortagesPage() {
  const lowProducts = getLowStockProducts();
  let html = `
    <div class="section">
      <div class="section-title">⚠️ المنتجات الناقصة (أقل من ${LOW_STOCK_THRESHOLD} قطعة)</div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>المنتج</th><th>الرصيد الحالي</th><th>الحد الأدنى</th><th>الحالة</th><th>سعر الشراء</th><th>سعر البيع</th></tr>
          </thead>
          <tbody id="shortagesList"></tbody>
        </table>
      </div>
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn btn-warning" onclick="exportShortagesReport()">📋 تصدير تقرير النواقص</button>
      </div>
    </div>
  `;
  document.getElementById('contentArea').innerHTML = html;
  
  let tbody = document.getElementById('shortagesList');
  if (lowProducts.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">✅ ممتاز! جميع المنتجات متوفرة بكميات جيدة</td></tr>';
  } else {
    lowProducts.forEach((p, idx) => {
      let status = p.stock === 0 ? '⚠️ نفد بالكامل' : (p.stock < 10 ? '🔴 حرج' : '🟡 منخفض');
      tbody.innerHTML += `
        <tr data-id="${p.id}">
          <td>${idx+1}</td>
          <td>${p.name}</td>
          <td class="tag-red">${p.stock} قطعة</td>
          <td>${LOW_STOCK_THRESHOLD}</td>
          <td>${status}</td>
          <td>${p.buyPrice} ج</td>
          <td>${p.sellPrice} ج</td>
        </tr>
      `;
    });
  }
}

function exportShortagesReport() {
  const lowProducts = getLowStockProducts();
  if (lowProducts.length === 0) {
    alert("لا توجد منتجات ناقصة حالياً.");
    return;
  }
  let report = "تقرير المنتجات الناقصة\n";
  report += `التاريخ: ${new Date().toLocaleString('ar-EG')}\n`;
  report += `الحد الأدنى: ${LOW_STOCK_THRESHOLD} قطعة\n`;
  report += "-".repeat(40) + "\n";
  lowProducts.forEach(p => {
    report += `📦 ${p.name} | الرصيد: ${p.stock} | سعر الشراء: ${p.buyPrice} | سعر البيع: ${p.sellPrice}\n`;
  });
  report += "-".repeat(40) + "\n";
  report += `عدد المنتجات الناقصة: ${lowProducts.length}`;
  
  const blob = new Blob([report], {type: "text/plain"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `نواقص_المخزون_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function renderDashboard() {
  let totalProducts = products.length;
  let totalStock = products.reduce((s,p)=>s+p.stock,0);
  let totalSales = invoices.reduce((s,i)=>s+i.total,0);
  let totalReturns = returns.reduce((s,r)=>s+r.total,0);
  let netSales = totalSales - totalReturns;
  let lowStockCount = getLowStockProducts().length;
  
  let lowStockWarning = '';
  if (currentUser === 'admin' && lowStockCount > 0) {
    lowStockWarning = `<div class="stat-card" style="border-color: var(--warning);">
      <div class="stat-lbl">⚠️ منتجات ناقصة</div>
      <div class="stat-val" style="color: var(--warning);">${lowStockCount}</div>
      <div class="stat-lbl">أقل من ${LOW_STOCK_THRESHOLD} قطعة</div>
    </div>`;
  }
  
  let html = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-lbl">المنتجات</div><div class="stat-val">${totalProducts}</div></div>
      <div class="stat-card"><div class="stat-lbl">المخزون</div><div class="stat-val">${totalStock}</div></div>
      <div class="stat-card"><div class="stat-lbl">المبيعات</div><div class="stat-val">${totalSales.toFixed(2)} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">المرتجعات</div><div class="stat-val">${totalReturns.toFixed(2)} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">صافي الإيرادات</div><div class="stat-val">${netSales.toFixed(2)} ج</div></div>
      ${lowStockWarning}
    </div>
    <div class="section"><div class="section-title">📋 آخر الفواتير</div>${renderInvoicesTable(invoices.slice(0,5))}</div>
  `;
  document.getElementById('contentArea').innerHTML = html;
}

function renderInvoicesTable(invList) {
  if(!invList.length) return '<div class="empty-state">لا توجد فواتير</div>';
  let html = '<div class="tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th></tr></thead><tbody>';
  invList.forEach((inv,idx)=>{
    html += `<tr><td>${idx+1}</td><td>${inv.customer}</td><td>${inv.date}</td><td>${inv.total} ج</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function renderProductsPage() {
  let html = `<div class="section"><div class="section-title">📦 المنتجات</div>
  <div class="form-row"><div class="form-group"><label>🔍 بحث</label><input type="text" id="searchProduct" placeholder="اسم المنتج..."></div></div>
  <div class="tbl-wrap"><table><thead><tr><th>#</th><th>المنتج</th><th>سعر البيع</th>${currentUser==='admin'?'<th>سعر الشراء</th>':''}<th>المخزون</th><th></th></tr></thead><tbody id="productsList"></tbody></table></div>`;
  if(currentUser==='admin') html += `<div class="btn-row"><button class="btn btn-primary" onclick="openAddProductModal()">➕ إضافة منتج</button></div>`;
  html += `</div>`;
  document.getElementById('contentArea').innerHTML = html;
  renderProductsList();
  document.getElementById('searchProduct')?.addEventListener('input',()=>renderProductsList());
}

function renderProductsList() {
  let search = document.getElementById('searchProduct')?.value.toLowerCase()||'';
  let filtered = products.filter(p=>p.name.toLowerCase().includes(search));
  let html = '';
  filtered.forEach((p,i)=>{
    let stockClass = p.stock < LOW_STOCK_THRESHOLD ? 'tag-red' : '';
    let lowStockBadge = (p.stock < LOW_STOCK_THRESHOLD && currentUser === 'admin') ? `<span class="badge-warning">ناقص</span>` : '';
    html += `<tr data-id="${p.id}"><td>${i+1}</td><td>${p.name} ${lowStockBadge}</td><td>${p.sellPrice} ج</td>`;
    if(currentUser==='admin') html += `<td>${p.buyPrice} ج</td>`;
    html += `<td class="${stockClass}">${p.stock}</td><td>`;
    if(currentUser==='admin') html += `<button class="btn-info btn-sm" onclick="editProduct(${p.id})">✏️</button> <button class="btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>`;
    html += `</td></tr>`;
  });
  document.getElementById('productsList').innerHTML = html;
}

function openAddProductModal() {
  let name = prompt("اسم المنتج:");
  if(!name) return;
  let sell = parseFloat(prompt("سعر البيع:"));
  let buy = parseFloat(prompt("سعر الشراء:"));
  let stock = parseInt(prompt("الكمية:",10));
  if(!isNaN(sell) && !isNaN(buy)) {
    products.push({id:Date.now(), name, sellPrice:sell, buyPrice:buy, stock:stock || 0});
    saveProducts(); 
    renderProductsList();
    if(currentUser === 'admin') renderDashboard();
  }
}
function editProduct(id) {
  let p = products.find(p=>p.id===id);
  let newName = prompt("الاسم:", p.name);
  let newSell = parseFloat(prompt("سعر البيع:", p.sellPrice));
  let newBuy = parseFloat(prompt("سعر الشراء:", p.buyPrice));
  let newStock = parseInt(prompt("الكمية:", p.stock));
  if(newName) p.name = newName;
  if(!isNaN(newSell)) p.sellPrice = newSell;
  if(!isNaN(newBuy) && currentUser==='admin') p.buyPrice = newBuy;
  if(!isNaN(newStock)) p.stock = newStock;
  saveProducts(); 
  renderProductsList();
  if(currentUser === 'admin') renderDashboard();
}
function deleteProduct(id) {
  if(confirm("حذف المنتج؟")) {
    products = products.filter(p=>p.id!==id);
    saveProducts(); 
    renderProductsList();
    if(currentUser === 'admin') renderDashboard();
  }
}

// ============= البيع =============
let currentInvoiceItems = [];

function renderSalesPage() {
  let html = `
    <div class="section"><div class="section-title">🛒 فاتورة جديدة</div>
    <div class="form-row"><div class="form-group"><label>👤 اسم العميل</label><input type="text" id="customerName" placeholder="أدخل اسم العميل"></div></div>
    <div class="form-row"><div class="form-group"><label>🛍️ المنتج</label><select id="productSelect"></select></div>
    <div class="form-group"><label>سعر مختلف (اختياري)</label><input type="number" id="customPrice" placeholder="سعر مختلف"></div></div>
    <button class="btn btn-primary" onclick="addToInvoice()">➕ أضف للمنتج</button>
    <div id="invItems"></div>
    <div class="inv-total-box"><div class="lbl">الإجمالي:</div><div class="val" id="invoiceTotal">0</div></div>
    <div class="btn-row"><button class="btn btn-success" onclick="saveInvoice()">💾 حفظ</button><button class="btn btn-danger" onclick="clearInvoice()">🗑️ مسح</button></div>
    </div>`;
  document.getElementById('contentArea').innerHTML = html;
  renderProductSelect();
  renderCurrentInvoice();
}

function renderProductSelect() {
  let sel = document.getElementById('productSelect');
  if(!sel) return;
  sel.innerHTML = '<option value="">-- اختر منتج --</option>' + products.map(p=>`<option value="${p.id}">${p.name} - ${p.sellPrice} ج (المتبقي: ${p.stock})</option>`).join('');
}

function addToInvoice() {
  let pid = document.getElementById('productSelect').value;
  if(!pid) { alert("اختر منتج"); return; }
  let product = products.find(p=>p.id==pid);
  if(product.stock<=0) { alert("غير متوفر"); return; }
  let custom = parseFloat(document.getElementById('customPrice').value);
  let finalPrice = !isNaN(custom) && custom>0 ? custom : product.sellPrice;
  let existing = currentInvoiceItems.find(i=>i.productId==pid);
  if(existing) {
    if(existing.quantity+1 > product.stock) { alert("الكمية أكبر من المتوفر"); return; }
    existing.quantity++;
    existing.total = existing.quantity * existing.sellPrice;
  } else {
    currentInvoiceItems.push({productId:product.id, name:product.name, sellPrice:finalPrice, quantity:1, total:finalPrice});
  }
  renderCurrentInvoice();
  document.getElementById('customPrice').value = '';
}

function renderCurrentInvoice() {
  let container = document.getElementById('invItems');
  if(!container) return;
  let html = '';
  currentInvoiceItems.forEach((item,idx)=>{
    html += `<div class="inv-item-row">
      <div>${item.name}</div>
      <input type="number" value="${item.sellPrice}" onchange="updateItemPrice(${idx}, this.value)">
      <div><button class="btn-sm" style="background:var(--border)" onclick="changeQty(${idx},-1)">-</button> ${item.quantity} <button class="btn-sm" style="background:var(--border)" onclick="changeQty(${idx},1)">+</button></div>
      <div>${item.total} ج</div>
      <button class="btn-danger btn-sm" onclick="removeItem(${idx})">🗑️</button>
    </div>`;
  });
  container.innerHTML = html;
  let total = currentInvoiceItems.reduce((s,i)=>s+i.total,0);
  document.getElementById('invoiceTotal').innerText = total;
}

function updateItemPrice(idx, newPrice) {
  let price = parseFloat(newPrice);
  if(!isNaN(price) && price>0) {
    currentInvoiceItems[idx].sellPrice = price;
    currentInvoiceItems[idx].total = currentInvoiceItems[idx].quantity * price;
    renderCurrentInvoice();
  }
}
function changeQty(idx, delta) {
  let item = currentInvoiceItems[idx];
  let product = products.find(p=>p.id==item.productId);
  let newQty = item.quantity + delta;
  if(newQty<1) { removeItem(idx); return; }
  if(newQty > product.stock) { alert("الكمية أكبر من المتوفر"); return; }
  item.quantity = newQty;
  item.total = item.quantity * item.sellPrice;
  renderCurrentInvoice();
}
function removeItem(idx) { currentInvoiceItems.splice(idx,1); renderCurrentInvoice(); }
function clearInvoice() { currentInvoiceItems = []; renderCurrentInvoice(); }

function saveInvoice() {
  let customer = document.getElementById('customerName').value.trim();
  if(!customer) { alert("أدخل اسم العميل"); return; }
  if(currentInvoiceItems.length===0) { alert("أضف منتجات"); return; }
  for(let item of currentInvoiceItems) {
    let product = products.find(p=>p.id==item.productId);
    if(product.stock < item.quantity) { alert(`الكمية من ${product.name} غير متوفرة`); return; }
    product.stock -= item.quantity;
  }
  let total = currentInvoiceItems.reduce((s,i)=>s+i.total,0);
  let invoice = { id: Date.now(), customer, date: new Date().toLocaleString('ar-EG'), items: JSON.parse(JSON.stringify(currentInvoiceItems)), total };
  invoices.unshift(invoice);
  saveProducts(); saveInvoices();
  clearInvoice();
  document.getElementById('customerName').value = '';
  alert("✅ تم حفظ الفاتورة");
  renderInvoicesPage();
  if(currentUser === 'admin') renderDashboard();
}

// ============= الفواتير =============
function renderInvoicesPage() {
  let html = `<div class="section"><div class="section-title">📄 الفواتير</div><div id="invoicesList"></div></div>`;
  document.getElementById('contentArea').innerHTML = html;
  let invHtml = '';
  if(invoices.length===0) invHtml = '<div class="empty-state">لا توجد فواتير</div>';
  else {
    invHtml = '<div class="tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th><th></th></tr></thead><tbody>';
    invoices.forEach((inv,idx)=>{
      invHtml += `<tr><td>${idx+1}</td><td>${inv.customer}</td><td>${inv.date}</td><td>${inv.total} ج</td>
      <td><button class="btn-info btn-sm" onclick="viewInvoice(${inv.id})">📋 عرض</button>
      ${currentUser==='admin'?`<button class="btn-danger btn-sm" onclick="deleteInvoice(${inv.id})">🗑️ حذف</button>`:''}
      <button class="btn-primary btn-sm" onclick="editInvoice(${inv.id})">✏️ تعديل</button></td></tr>`;
    });
    invHtml += '</tbody></table></div>';
  }
  document.getElementById('invoicesList').innerHTML = invHtml;
}

function viewInvoice(id) {
  let inv = invoices.find(i=>i.id===id);
  if(!inv) return;
  let msg = `العميل: ${inv.customer}\nالتاريخ: ${inv.date}\nالمنتجات:\n` + inv.items.map(i=>`${i.name} - ${i.quantity} × ${i.sellPrice} = ${i.total}`).join('\n') + `\nالإجمالي: ${inv.total} ج`;
  alert(msg);
}

function deleteInvoice(id) {
  if(!confirm("حذف الفاتورة؟")) return;
  let inv = invoices.find(i=>i.id===id);
  if(inv) {
    for(let item of inv.items) {
      let prod = products.find(p=>p.name===item.name);
      if(prod) prod.stock += item.quantity;
    }
    invoices = invoices.filter(i=>i.id!==id);
    saveProducts(); saveInvoices();
    renderInvoicesPage();
    if(currentUser === 'admin') renderDashboard();
    alert("✅ تم الحذف");
  }
}
function editInvoice(id) {
  let inv = invoices.find(i=>i.id===id);
  if(!inv) return;
  let newCustomer = prompt("اسم العميل:", inv.customer);
  if(newCustomer) inv.customer = newCustomer;
  for(let i=0; i<inv.items.length; i++) {
    let item = inv.items[i];
    let newQty = parseInt(prompt(`الكمية الجديدة لـ ${item.name} (الكمية الحالية: ${item.quantity}):`, item.quantity));
    if(!isNaN(newQty) && newQty>0) {
      let product = products.find(p=>p.name===item.name);
      if(product) {
        let diff = newQty - item.quantity;
        if(diff > 0 && product.stock < diff) { alert(`لا يوجد مخزون كافٍ لـ ${product.name}`); return; }
        product.stock -= diff;
      }
      item.quantity = newQty;
      item.total = item.quantity * item.sellPrice;
    }
  }
  inv.total = inv.items.reduce((s,i)=>s+i.total,0);
  saveProducts(); saveInvoices();
  renderInvoicesPage();
  if(currentUser === 'admin') renderDashboard();
  alert("✅ تم تعديل الفاتورة");
}

// ============= المرتجعات =============
function renderReturnsPage() {
  let html = `<div class="section"><div class="section-title">🔄 إرجاع منتج</div>
  <div class="form-row"><div class="form-group"><label>📄 اختر الفاتورة</label><select id="returnInvoiceSelect"></select></div></div>
  <button class="btn btn-primary" onclick="loadReturnInvoice()">عرض الفاتورة</button>
  <div id="returnItemsArea"></div>
  <button class="btn btn-success" onclick="processReturn()" style="margin-top:10px;">تأكيد الإرجاع</button>
  </div>
  <div class="section"><div class="section-title">📋 سجل المرتجعات</div><div id="returnsHistory"></div></div>`;
  document.getElementById('contentArea').innerHTML = html;
  populateReturnSelect();
  renderReturnsHistory();
}

function populateReturnSelect() {
  let sel = document.getElementById('returnInvoiceSelect');
  if(!sel) return;
  sel.innerHTML = '<option value="">-- اختر فاتورة --</option>' + invoices.map(inv=>`<option value="${inv.id}">فاتورة #${inv.id} - ${inv.customer} - ${inv.total} ج</option>`).join('');
}

function loadReturnInvoice() {
  let id = document.getElementById('returnInvoiceSelect').value;
  if(!id) { alert("اختر فاتورة"); return; }
  let inv = invoices.find(i=>i.id==id);
  if(!inv) return;
  let html = `<div class="tbl-wrap"><table><thead><tr><th>المنتج</th><th>الكمية المشتراة</th><th>السعر</th><th>كمية المرتجع</th></tr></thead><tbody>`;
  inv.items.forEach((item,idx)=>{
    html += `<tr><td>${item.name}</td><td>${item.quantity}</td><td>${item.sellPrice} ج</td>
    <td><input type="number" id="ret-qty-${idx}" min="0" max="${item.quantity}" value="0" style="width:80px;"></td></tr>`;
  });
  html += `</tbody></table><input type="hidden" id="returnInvId" value="${inv.id}"></div>`;
  document.getElementById('returnItemsArea').innerHTML = html;
}

function processReturn() {
  let invId = document.getElementById('returnInvId')?.value;
  if(!invId) { alert("اختر فاتورة أولاً"); return; }
  let invoice = invoices.find(i=>i.id==invId);
  if(!invoice) return;
  let returned = [];
  let totalReturn = 0;
  for(let i=0; i<invoice.items.length; i++) {
    let qty = parseInt(document.getElementById(`ret-qty-${i}`)?.value||0);
    if(qty>0) {
      let product = products.find(p=>p.name===invoice.items[i].name);
      if(product) { product.stock += qty; }
      returned.push({name:invoice.items[i].name, quantity:qty, price:invoice.items[i].sellPrice, total:qty*invoice.items[i].sellPrice});
      totalReturn += qty*invoice.items[i].sellPrice;
    }
  }
  if(returned.length===0) { alert("لم تختر أي منتجات"); return; }
  returns.unshift({id:Date.now(), invoiceId:invId, date:new Date().toLocaleString('ar-EG'), items:returned, total:totalReturn});
  saveProducts(); saveReturns();
  renderReturnsHistory();
  if(currentUser === 'admin') renderDashboard();
  alert(`✅ تم الإرجاع بقيمة ${totalReturn} ج`);
  document.getElementById('returnItemsArea').innerHTML = '';
  populateReturnSelect();
}

function renderReturnsHistory() {
  let container = document.getElementById('returnsHistory');
  if(!container) return;
  if(returns.length===0) { container.innerHTML='<div class="empty-state">لا توجد مرتجعات</div>'; return; }
  let html = '<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>رقم الفاتورة</th><th>المنتجات</th><th>الإجمالي</th></tr></thead><tbody>';
  returns.forEach(r=>{
    let itemsText = r.items.map(i=>`${i.name} x${i.quantity}`).join(', ');
    html += `<tr><td>${r.date}</td><td>#${r.invoiceId}</td><td>${itemsText}</td><td>${r.total} ج</tr>`;
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

// ============= الإيرادات =============
function renderRevenuePage() {
  let today = new Date().toISOString().split('T')[0];
  let todayTotal = 0, monthTotal = 0, allTotal = 0;
  let now = new Date();
  let monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  invoices.forEach(inv=>{
    let invDate = inv.date.split(' ')[0];
    allTotal += inv.total;
    if(invDate === today) todayTotal += inv.total;
    if(new Date(invDate) >= monthStart) monthTotal += inv.total;
  });
  let returnsTotal = returns.reduce((s,r)=>s+r.total,0);
  let netRevenue = allTotal - returnsTotal;
  let html = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-lbl">اليوم</div><div class="stat-val">${todayTotal.toFixed(2)} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">هذا الشهر</div><div class="stat-val">${monthTotal.toFixed(2)} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">الإجمالي الكلي</div><div class="stat-val">${allTotal.toFixed(2)} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">المرتجعات</div><div class="stat-val">${returnsTotal.toFixed(2)} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">صافي الإيرادات</div><div class="stat-val">${netRevenue.toFixed(2)} ج</div></div>
    </div>
    <div class="section"><div class="section-title">📊 جميع الفواتير</div>${renderInvoicesTable(invoices)}</div>
  `;
  document.getElementById('contentArea').innerHTML = html;
}
</script>
