<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AXON - نظام مبيعات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #1a1a2e; direction: rtl; height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
.login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
.login-card button { width: 100%; padding: 12px; background: #f39c12; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
.error-msg { color: red; margin-top: 10px; }
</style>
</head>
<body>

<div class="login-card">
  <h2>AXON</h2>
  <p>نظام إدارة المبيعات</p>
  <input type="password" id="loginPassword" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
  <button onclick="checkLogin()">دخول</button>
  <div id="loginError" class="error-msg"></div>
</div>

<script>
let userPassword = "1234";
let adminPassword = "admin123";

function checkLogin() {
  let pass = document.getElementById('loginPassword').value;
  if (pass === adminPassword || pass === userPassword) {
    alert("تم الدخول بنجاح!");
  } else {
    document.getElementById('loginError').innerText = "كلمة سر خاطئة";
  }
}
</script>
</body>
</html>
