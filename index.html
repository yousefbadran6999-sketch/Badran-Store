<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badran CNC - نظام إدارة المبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --accent: #f59e0b;
  --accent-dark: #d97706;
  --green: #10b981;
  --blue: #3b82f6;
  --danger: #ef4444;
  --text: #1e293b;
  --muted: #64748b;
  --warning: #f59e0b;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.04);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  direction:rtl;
  min-height:100vh;
  position: relative;
}
body::after {
  content: "Badran CNC";
  position: fixed;
  bottom: 15px;
  right: 20px;
  font-size: 28px;
  font-weight: 900;
  color: rgba(0,0,0,0.03);
  pointer-events: none;
  z-index: 0;
  font-family: monospace;
}

/* ===== LOGIN ===== */
#loginScreen {
  position:fixed; inset:0;
  background: linear-gradient(135deg, #fef3c7 0%, #fde68a 30%, #f8fafc 100%);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:var(--surface); border-radius:32px;
  padding:40px 40px 50px; width:420px; text-align:center;
  box-shadow: var(--shadow-lg);
  border:1px solid rgba(0,0,0,0.06);
}
.login-logo { width:120px; height:auto; margin-bottom:16px; border-radius:16px; background:#f8fafc; padding:8px; }
.login-logo-placeholder {
  width:90px; height:90px; margin:0 auto 16px;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-size:2rem; font-weight:900; color:#fff; letter-spacing:-1px;
}
.login-box h1 { font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,#f59e0b,#d97706); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:6px; }
.login-box .sub { color:var(--muted); font-size:.9rem; margin-bottom:28px; }
.login-box input { width:100%; padding:14px 16px; margin:8px 0; background:#f8fafc; border:1.5px solid var(--border); border-radius:14px; color:var(--text); font-size:1rem; font-family:'Cairo',sans-serif; transition:.2s; }
.login-box input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(245,158,11,.15); }
.login-box button { width:100%; padding:14px; background:linear-gradient(135deg,#f59e0b,#d97706); border:none; border-radius:14px; font-weight:700; cursor:pointer; color:#fff; font-size:1rem; font-family:'Cairo',sans-serif; transition:.2s; margin-top:8px; }
.login-box button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(245,158,11,.3); }
.login-err { color:var(--danger); margin-top:14px; font-size:.85rem; min-height:20px; }

/* ===== APP SHELL ===== */
#app { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 24px; height:68px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:var(--shadow); position:sticky; top:0; z-index:100;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.company-logo { display:flex; align-items:center; gap:10px; background:#f8fafc; padding:6px 16px; border-radius:40px; border:1px solid var(--border); }
.company-logo img { width:32px; height:32px; object-fit:contain; }
.company-logo-icon { width:32px; height:32px; background:linear-gradient(135deg,#f59e0b,#d97706); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; font-size:.8rem; }
.company-logo span { font-weight:800; font-size:1.15rem; background:linear-gradient(135deg,#1e293b,#334155); -webkit-background-clip:text; background-clip:text; color:transparent; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.badge-role { padding:6px 14px; border-radius:30px; background:rgba(245,158,11,.12); color:var(--accent-dark); font-weight:700; font-size:.85rem; }
.btn-logout { background:transparent; border:1.5px solid var(--border); color:var(--muted); padding:7px 18px; border-radius:30px; cursor:pointer; font-family:'Cairo',sans-serif; font-weight:600; transition:.2s; }
.btn-logout:hover { background:#f1f5f9; color:var(--text); }

/* ===== NAVTABS ===== */
.navtabs {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; gap:4px; padding:10px 24px; overflow-x:auto;
  scrollbar-width:none;
}
.navtabs::-webkit-scrollbar { display:none; }
.navtab {
  padding:8px 22px; border-radius:40px; cursor:pointer; font-weight:600;
  color:var(--muted); background:transparent; border:none; font-family:'Cairo',sans-serif;
  transition:.2s; white-space:nowrap; font-size:.9rem;
}
.navtab:hover { background:#f1f5f9; color:var(--text); }
.navtab.active { background:var(--accent); color:#fff; box-shadow:0 4px 12px rgba(245,158,11,.3); }

/* ===== CONTENT ===== */
.content { flex:1; padding:24px; }

/* ===== STATS ===== */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:22px; }
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:18px; text-align:center; box-shadow:var(--shadow); cursor:pointer; transition:.2s;
}
.stat-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-lg); }
.stat-card .stat-val { font-size:1.7rem; font-weight:900; margin:6px 0 4px; background:linear-gradient(135deg,#f59e0b,#d97706); -webkit-background-clip:text; background-clip:text; color:transparent; }
.stat-card .stat-lbl { color:var(--muted); font-size:.82rem; font-weight:600; }

/* ===== SECTION ===== */
.section { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:22px; margin-bottom:20px; box-shadow:var(--shadow); }
.section-title { font-size:1.05rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; border-right:3px solid var(--accent); padding-right:12px; }

/* ===== FORMS ===== */
.form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; margin-bottom:14px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group label { font-size:.82rem; color:var(--muted); font-weight:600; }
.form-group input, .form-group select, .form-group textarea {
  padding:11px 14px; background:#f8fafc; border:1.5px solid var(--border);
  border-radius:12px; color:var(--text); outline:none; transition:.2s;
  font-family:'Cairo',sans-serif; font-size:.9rem;
}
.form-group input:focus, .form-group select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(245,158,11,.12); }
.search-box { position:relative; }
.search-box input { padding-right:38px; }
.search-icon { position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1rem; pointer-events:none; }

/* ===== BUTTONS ===== */
.btn { padding:10px 24px; border-radius:40px; font-weight:700; cursor:pointer; border:none; transition:.2s; font-size:.88rem; font-family:'Cairo',sans-serif; }
.btn:hover { transform:translateY(-2px); }
.btn-primary { background:var(--accent); color:#fff; box-shadow:0 4px 12px rgba(245,158,11,.25); }
.btn-primary:hover { background:var(--accent-dark); box-shadow:0 6px 16px rgba(245,158,11,.35); }
.btn-success { background:var(--green); color:#fff; box-shadow:0 4px 12px rgba(16,185,129,.2); }
.btn-success:hover { background:#059669; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#dc2626; }
.btn-info { background:var(--blue); color:#fff; }
.btn-info:hover { background:#2563eb; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-ghost { background:#f1f5f9; color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:#e2e8f0; }
.btn-sm { padding:5px 14px; font-size:.75rem; border-radius:20px; }
.btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }

/* ===== TABLE ===== */
.tbl-wrap { overflow-x:auto; border-radius:16px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:.88rem; }
th { background:#f8fafc; padding:13px 14px; text-align:right; border-bottom:2px solid var(--border); font-weight:700; font-size:.82rem; color:var(--muted); white-space:nowrap; }
td { padding:12px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafafa; }
.tag-red { color:var(--danger); font-weight:700; }
.empty-state { text-align:center; padding:50px; color:var(--muted); font-size:.95rem; }
.badge-low { background:rgba(239,68,68,.1); color:var(--danger); padding:2px 10px; border-radius:20px; font-size:.72rem; font-weight:700; margin-right:6px; }
.badge-ok { background:rgba(16,185,129,.1); color:var(--green); padding:2px 10px; border-radius:20px; font-size:.72rem; font-weight:700; }

/* ===== INVOICE ITEMS ===== */
.inv-item-row {
  display:grid; grid-template-columns:2fr 110px 120px 90px 36px;
  gap:10px; margin-bottom:10px; align-items:center;
  background:#f8fafc; padding:10px 14px; border-radius:12px;
  border:1px solid var(--border);
}
.qty-ctrl { display:flex; align-items:center; gap:6px; }
.qty-btn { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border); background:#fff; cursor:pointer; font-weight:700; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:.15s; }
.qty-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.inv-total-box { background:linear-gradient(135deg,#fef3c7,#fde68a); border-radius:16px; padding:14px 22px; display:flex; justify-content:flex-end; align-items:center; gap:16px; margin-top:16px; border:1px solid #fcd34d; }
.inv-total-box .lbl { color:#92400e; font-weight:700; font-size:.9rem; }
.inv-total-box .val { font-size:1.6rem; font-weight:900; color:#92400e; }

/* ===== MODAL ===== */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:5000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
.modal { background:#fff; border-radius:24px; padding:28px; min-width:360px; max-width:520px; width:90%; box-shadow:0 25px 50px rgba(0,0,0,.15); }
.modal-title { font-size:1.1rem; font-weight:800; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

/* ===== ADD PRODUCT FORM ===== */
.add-product-form { background:#f8fafc; border-radius:16px; padding:18px; border:1px solid var(--border); margin-top:16px; }
.add-product-title { font-weight:700; color:var(--text); margin-bottom:14px; font-size:.95rem; }

/* ===== SALES SEARCH ===== */
.product-search-results { position:absolute; top:100%; right:0; left:0; background:#fff; border:1.5px solid var(--accent); border-top:none; border-radius:0 0 14px 14px; z-index:200; max-height:220px; overflow-y:auto; box-shadow:0 8px 20px rgba(0,0,0,.1); }
.product-search-item { padding:10px 14px; cursor:pointer; transition:.15s; font-size:.9rem; display:flex; justify-content:space-between; align-items:center; }
.product-search-item:hover { background:rgba(245,158,11,.08); }
.product-search-item .item-stock { font-size:.75rem; color:var(--muted); }
.search-wrapper { position:relative; }

/* ===== DAILY SALES PRINT ===== */
.print-hidden { display:none !important; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#f1f5f9; }
::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div id="loginLogoWrapper"></div>
    <h1>BADRAN CNC</h1>
    <div class="sub">نظام إدارة المبيعات</div>
    <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="off">
    <input type="password" id="loginPass" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()">دخول</button>
    <div id="loginError" class="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="company-logo" id="topLogoWrapper"></div>
    </div>
    <div class="topbar-right">
      <span class="badge-role" id="userRoleBadge"></span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="navtabs" id="navTabs"></div>
  <div class="content" id="contentArea"></div>
</div>

<script>
// ============================================================
// CONFIG & SECURITY
// ============================================================
// كلمات السر الافتراضية — بعد أول تشغيل بتتحفظ في ملف البيانات
const INIT_ADMIN_PASS = 'admin123';
const INIT_USER_PASS  = '1234';

// hash بسيط للتخزين (مش تشفير احترافي لكن أفضل من plain text)
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    let c = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash |= 0;
  }
  return 'h_' + Math.abs(hash).toString(36);
}

// ============================================================
// DATA LAYER  — يدعم Electron (fs) ومتصفح (localStorage)
// ============================================================
const IS_ELECTRON = typeof window !== 'undefined' && window.electronAPI !== undefined;

function readDataFromDisk() {
  if (IS_ELECTRON) {
    // Electron: نقرأ من ملف JSON على الجهاز
    return window.electronAPI.readData();
  } else {
    let raw = localStorage.getItem('badran_cnc_v2');
    return raw ? JSON.parse(raw) : null;
  }
}

function writeDataToDisk(data) {
  if (IS_ELECTRON) {
    window.electronAPI.writeData(data);
  } else {
    localStorage.setItem('badran_cnc_v2', JSON.stringify(data));
  }
}

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let products = [];
let invoices = [];
let returns  = [];
let adminPassHash = simpleHash(INIT_ADMIN_PASS);
let userPassHash  = simpleHash(INIT_USER_PASS);
const LOW_STOCK_THRESHOLD = 20;
let currentTab = 'dashboard';

// ============================================================
// LOAD / SAVE
// ============================================================
function loadData() {
  let data = null;
  try { data = readDataFromDisk(); } catch(e) {}
  if (data) {
    products      = data.products      || [];
    invoices      = data.invoices      || [];
    returns       = data.returns       || [];
    if (data.adminPassHash) adminPassHash = data.adminPassHash;
    if (data.userPassHash)  userPassHash  = data.userPassHash;
  }
  if (!products.length) {
    products = [
      { id:1, name:"سبندل 2.2 كيلو",   sellPrice:4500, buyPrice:3200, stock:10 },
      { id:2, name:"كنترولر Mach3",     sellPrice:1250, buyPrice:800,  stock:15 },
      { id:3, name:"موتور Nema23",      sellPrice:890,  buyPrice:550,  stock:25 },
      { id:4, name:"دراع روبوت",        sellPrice:3200, buyPrice:2100, stock:5  },
      { id:5, name:"سيرفو 1.5kw",      sellPrice:2850, buyPrice:1900, stock:18 }
    ];
  }
}

function saveAll() {
  writeDataToDisk({ products, invoices, returns, adminPassHash, userPassHash, lastUpdate: Date.now() });
}

// ============================================================
// LOGO HELPERS
// ============================================================
function logoImg(cls) {
  return `<img src="logo-badran.png" class="${cls}" onerror="this.outerHTML='<div class=\\'company-logo-icon\\'>B</div>'" style="width:32px;height:32px;object-fit:contain;">`;
}

function initLogos() {
  // Login logo
  let ll = document.getElementById('loginLogoWrapper');
  ll.innerHTML = `<img src="logo-badran.png" class="login-logo" onerror="this.outerHTML='<div class=\\'login-logo-placeholder\\'>B</div>'">`;
  // Top bar logo
  let tl = document.getElementById('topLogoWrapper');
  tl.innerHTML = `<img src="logo-badran.png" onerror="this.outerHTML='<div class=\\'company-logo-icon\\'>B</div>'" style="width:32px;height:32px;object-fit:contain;border-radius:8px;"><span>Badran CNC</span>`;
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
function checkLogin() {
  let username = document.getElementById('loginUsername').value.trim();
  let password = document.getElementById('loginPass').value;
  let errEl = document.getElementById('loginError');
  errEl.innerText = '';

  if (username !== 'badran') {
    errEl.innerText = '❌ اسم المستخدم غير صحيح';
    document.getElementById('loginPass').value = '';
    return;
  }

  let hashed = simpleHash(password);

  if (hashed === adminPassHash) {
    currentUser = { role:'admin', name:'أدمن' };
    document.getElementById('userRoleBadge').innerText = '👑 أدمن';
    startApp();
  } else if (hashed === userPassHash) {
    currentUser = { role:'user', name:'مستخدم' };
    document.getElementById('userRoleBadge').innerText = '👤 مستخدم';
    startApp();
  } else {
    errEl.innerText = '❌ كلمة السر غير صحيحة';
    document.getElementById('loginPass').value = '';
  }
}

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
  renderTabs();
  switchTab('dashboard', true);
}

function logout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').innerText = '';
}

// ============================================================
// TABS
// ============================================================
function renderTabs() {
  let tabs = [
    { id:'dashboard', name:'📊 الرئيسية' },
    { id:'products',  name:'📦 المنتجات' },
    { id:'sales',     name:'🛒 البيع'     },
    { id:'invoices',  name:'📄 الفواتير'  },
    { id:'returns',   name:'🔄 المرتجعات' },
    { id:'revenue',   name:'💰 الإيرادات' }
  ];
  if (currentUser.role === 'admin') {
    tabs.push({ id:'shortages', name:'⚠️ النواقص' });
    tabs.push({ id:'settings',  name:'⚙️ الإعدادات' });
  }
  let html = '';
  tabs.forEach(t => { html += `<button class="navtab" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.name}</button>`; });
  document.getElementById('navTabs').innerHTML = html;
}

function switchTab(tabId, skipHistory) {
  currentTab = tabId;
  document.querySelectorAll('.navtab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });
  const renders = {
    dashboard: renderDashboard,
    products:  renderProductsPage,
    sales:     renderSalesPage,
    invoices:  renderInvoicesPage,
    returns:   renderReturnsPage,
    revenue:   renderRevenuePage,
    shortages: renderShortagesPage,
    settings:  renderSettingsPage
  };
  if (renders[tabId]) renders[tabId]();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  let totalStock  = products.reduce((s,p)=>s+p.stock, 0);
  let totalSales  = invoices.reduce((s,i)=>s+i.total, 0);
  let totalReturn = returns.reduce((s,r)=>s+r.total,  0);
  let net = totalSales - totalReturn;
  let lowCount = products.filter(p=>p.stock < LOW_STOCK_THRESHOLD).length;

  let lowCard = (currentUser.role==='admin' && lowCount>0)
    ? `<div class="stat-card" onclick="switchTab('shortages')"><div class="stat-lbl">⚠️ نواقص</div><div class="stat-val" style="color:var(--danger)">${lowCount}</div><div class="stat-lbl">تحتاج تجديد</div></div>` : '';

  document.getElementById('contentArea').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-lbl">📦 المنتجات</div><div class="stat-val">${products.length}</div></div>
      <div class="stat-card"><div class="stat-lbl">🗂️ المخزون</div><div class="stat-val">${totalStock}</div></div>
      <div class="stat-card"><div class="stat-lbl">💰 إجمالي المبيعات</div><div class="stat-val">${totalSales.toLocaleString('ar-EG')} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">🔄 المرتجعات</div><div class="stat-val">${totalReturn.toLocaleString('ar-EG')} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">📈 صافي الإيرادات</div><div class="stat-val">${net.toLocaleString('ar-EG')} ج</div></div>
      ${lowCard}
    </div>
    <div class="section">
      <div class="section-title">📋 آخر الفواتير</div>
      ${buildInvoicesTable(invoices.slice(0,5), false)}
    </div>`;
}

// ============================================================
// PRODUCTS PAGE
// ============================================================
function renderProductsPage() {
  document.getElementById('contentArea').innerHTML = `
    <div class="section">
      <div class="section-title">📦 المنتجات</div>
      <div class="form-row">
        <div class="form-group" style="max-width:320px">
          <label>🔍 بحث عن منتج</label>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchProduct" placeholder="ابحث بالاسم..." oninput="renderProductsList()">
          </div>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>المنتج</th><th>سعر البيع</th>
            ${currentUser.role==='admin' ? '<th>سعر الشراء</th>' : ''}
            <th>المخزون</th>
            ${currentUser.role==='admin' ? '<th>إجراءات</th>' : ''}
          </tr></thead>
          <tbody id="productsList"></tbody>
        </table>
      </div>
      ${currentUser.role==='admin' ? `
      <div style="margin-top:18px">
        <button class="btn btn-primary" onclick="toggleAddProductForm()">➕ إضافة منتج جديد</button>
      </div>
      <div id="addProductForm" style="display:none" class="add-product-form">
        <div class="add-product-title">➕ بيانات المنتج الجديد</div>
        <div class="form-row">
          <div class="form-group"><label>اسم المنتج *</label><input type="text" id="np_name" placeholder="اسم المنتج"></div>
          <div class="form-group"><label>سعر البيع (ج) *</label><input type="number" id="np_sell" placeholder="0" min="0"></div>
          <div class="form-group"><label>سعر الشراء (ج) *</label><input type="number" id="np_buy" placeholder="0" min="0"></div>
          <div class="form-group"><label>الكمية *</label><input type="number" id="np_stock" placeholder="0" min="0"></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-success" onclick="addProduct()">✅ حفظ المنتج</button>
          <button class="btn btn-ghost" onclick="toggleAddProductForm()">إلغاء</button>
        </div>
      </div>` : ''}
    </div>`;
  renderProductsList();
}

function toggleAddProductForm() {
  let f = document.getElementById('addProductForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function renderProductsList() {
  let search = (document.getElementById('searchProduct')?.value || '').toLowerCase();
  let filtered = products.filter(p => p.name.toLowerCase().includes(search));
  let html = '';
  filtered.forEach((p, i) => {
    let stockBadge = p.stock < LOW_STOCK_THRESHOLD
      ? '<span class="badge-low">ناقص</span>' : '';
    let adminCols = currentUser.role === 'admin'
      ? `<td>${p.buyPrice.toLocaleString('ar-EG')} ج</td>` : '';
    let adminActions = currentUser.role === 'admin' ? `
      <td>
        <button class="btn btn-info btn-sm" onclick="openEditProduct(${p.id})">✏️ تعديل</button>
        <button class="btn btn-danger btn-sm" style="margin-right:4px" onclick="deleteProduct(${p.id})">🗑️</button>
      </td>` : '';
    html += `<tr>
      <td>${i+1}</td>
      <td>${p.name} ${stockBadge}</td>
      <td>${p.sellPrice.toLocaleString('ar-EG')} ج</td>
      ${adminCols}
      <td class="${p.stock < LOW_STOCK_THRESHOLD ? 'tag-red' : ''}">${p.stock}</td>
      ${adminActions}
    </tr>`;
  });
  if (!html) html = '<tr><td colspan="6" class="empty-state">لا توجد منتجات</td></tr>';
  document.getElementById('productsList').innerHTML = html;
}

function addProduct() {
  let name  = document.getElementById('np_name').value.trim();
  let sell  = parseFloat(document.getElementById('np_sell').value);
  let buy   = parseFloat(document.getElementById('np_buy').value);
  let stock = parseInt(document.getElementById('np_stock').value);
  if (!name)           return showToast('❌ أدخل اسم المنتج', 'error');
  if (isNaN(sell)||sell<0) return showToast('❌ سعر البيع غير صحيح', 'error');
  if (isNaN(buy)||buy<0)   return showToast('❌ سعر الشراء غير صحيح', 'error');
  if (isNaN(stock)||stock<0) return showToast('❌ الكمية غير صحيحة', 'error');
  products.push({ id:Date.now(), name, sellPrice:sell, buyPrice:buy, stock });
  saveAll();
  renderProductsList();
  // reset form
  ['np_name','np_sell','np_buy','np_stock'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addProductForm').style.display = 'none';
  showToast('✅ تمت إضافة المنتج');
}

function openEditProduct(id) {
  let p = products.find(x=>x.id===id);
  if(!p) return;
  showModal(`
    <div class="modal-title">✏️ تعديل المنتج</div>
    <div class="form-group" style="margin-bottom:12px"><label>الاسم</label><input type="text" id="ep_name" value="${p.name}"></div>
    <div class="form-group" style="margin-bottom:12px"><label>سعر البيع (ج)</label><input type="number" id="ep_sell" value="${p.sellPrice}" min="0"></div>
    <div class="form-group" style="margin-bottom:12px"><label>سعر الشراء (ج)</label><input type="number" id="ep_buy" value="${p.buyPrice}" min="0"></div>
    <div class="form-group" style="margin-bottom:12px"><label>الكمية</label><input type="number" id="ep_stock" value="${p.stock}" min="0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="saveEditProduct(${id})">💾 حفظ</button>
    </div>`);
}

function saveEditProduct(id) {
  let p = products.find(x=>x.id===id);
  let name  = document.getElementById('ep_name').value.trim();
  let sell  = parseFloat(document.getElementById('ep_sell').value);
  let buy   = parseFloat(document.getElementById('ep_buy').value);
  let stock = parseInt(document.getElementById('ep_stock').value);
  if (name) p.name = name;
  if (!isNaN(sell)&&sell>=0) p.sellPrice = sell;
  if (!isNaN(buy)&&buy>=0)   p.buyPrice  = buy;
  if (!isNaN(stock)&&stock>=0) p.stock   = stock;
  saveAll();
  closeModal();
  renderProductsList();
  showToast('✅ تم تعديل المنتج');
}

function deleteProduct(id) {
  if (!confirm('هل تريد حذف هذا المنتج نهائياً؟')) return;
  products = products.filter(p=>p.id!==id);
  saveAll();
  renderProductsList();
  showToast('✅ تم الحذف');
}

// ============================================================
let currentInvoiceItems = [];

function renderSalesPage() {
  document.getElementById('contentArea').innerHTML = `
    <div class="section">
      <div class="section-title">🛒 إنشاء فاتورة جديدة</div>
      <div class="form-row">
        <div class="form-group"><label>👤 اسم العميل *</label><input type="text" id="customerName" placeholder="اسم العميل"></div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0">
      <div style="font-weight:700;margin-bottom:10px;color:var(--muted);font-size:.9rem;">🔍 ابحث عن المنتج وأضفه للفاتورة</div>
      <div class="form-row" style="align-items:flex-end">
        <div class="form-group" style="position:relative">
          <label>اسم المنتج أو جزء منه</label>
          <div class="search-wrapper">
            <input type="text" id="salesSearch" placeholder="اكتب للبحث..." oninput="showSalesSearchResults()" autocomplete="off">
            <div id="salesSearchResults" class="product-search-results" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label>سعر مختلف (اختياري)</label>
          <input type="number" id="customPrice" placeholder="اتركه فاضي للسعر الأصلي" min="0">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label style="opacity:0">_</label>
          <button class="btn btn-primary" onclick="addSelectedToInvoice()">➕ أضف للفاتورة</button>
        </div>
      </div>
      <div id="invItems" style="margin-top:14px"></div>
      <div class="inv-total-box">
        <span class="lbl">الإجمالي:</span>
        <span class="val" id="invoiceTotal">0 ج</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" onclick="saveInvoice()">💾 حفظ الفاتورة</button>
        <button class="btn btn-danger"  onclick="clearInvoice()">🗑️ مسح الفاتورة</button>
      </div>
    </div>`;
  renderCurrentInvoice();
  // إغلاق نتائج البحث لو ضغط خارجها
  document.addEventListener('click', closeSalesSearchOnClickOutside);
}

let selectedProductId = null;

function showSalesSearchResults() {
  let q = document.getElementById('salesSearch').value.toLowerCase().trim();
  let box = document.getElementById('salesSearchResults');
  if (!q) { box.style.display='none'; selectedProductId=null; return; }
  let matches = products.filter(p => p.name.toLowerCase().includes(q));
  if (!matches.length) { box.style.display='none'; return; }
  box.innerHTML = matches.map(p => `
    <div class="product-search-item" onclick="selectSalesProduct(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
      <span>${p.name}</span>
      <span class="item-stock">${p.sellPrice} ج | متبقي: <strong>${p.stock}</strong></span>
    </div>`).join('');
  box.style.display = 'block';
}

function selectSalesProduct(id, name) {
  selectedProductId = id;
  document.getElementById('salesSearch').value = name;
  document.getElementById('salesSearchResults').style.display = 'none';
}

function closeSalesSearchOnClickOutside(e) {
  let box = document.getElementById('salesSearchResults');
  if (box && !box.contains(e.target) && e.target.id !== 'salesSearch') {
    box.style.display = 'none';
  }
}

function addSelectedToInvoice() {
  if (!selectedProductId) {
    // محاولة بحث تلقائي
    let q = document.getElementById('salesSearch')?.value.toLowerCase().trim();
    if (q) {
      let exact = products.find(p=>p.name.toLowerCase()===q);
      if (exact) selectedProductId = exact.id;
      else return showToast('❌ اختر منتج من القائمة', 'error');
    } else return showToast('❌ ابحث عن منتج أولاً', 'error');
  }
  let prod = products.find(p=>p.id===selectedProductId);
  if (!prod) return;
  if (prod.stock <= 0) return showToast('❌ المنتج غير متوفر في المخزون', 'error');

  let custom = parseFloat(document.getElementById('customPrice').value);
  let price  = (!isNaN(custom) && custom>0) ? custom : prod.sellPrice;

  let exist = currentInvoiceItems.find(i=>i.productId===prod.id);
  if (exist) {
    if (exist.quantity+1 > prod.stock) return showToast('❌ الكمية أكبر من المتوفر', 'error');
    exist.quantity++;
    exist.total = exist.quantity * exist.sellPrice;
  } else {
    currentInvoiceItems.push({ productId:prod.id, name:prod.name, sellPrice:price, quantity:1, total:price });
  }
  document.getElementById('salesSearch').value = '';
  document.getElementById('customPrice').value = '';
  selectedProductId = null;
  renderCurrentInvoice();
  showToast(`✅ تم إضافة ${prod.name}`);
}

function renderCurrentInvoice() {
  let cont = document.getElementById('invItems');
  if (!cont) return;
  if (!currentInvoiceItems.length) {
    cont.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:.9rem;">لم تُضف منتجات بعد</div>';
  } else {
    cont.innerHTML = currentInvoiceItems.map((it,i) => `
      <div class="inv-item-row">
        <div style="font-weight:600">${it.name}</div>
        <input type="number" value="${it.sellPrice}" min="0" style="padding:6px;border:1.5px solid var(--border);border-radius:8px;font-family:'Cairo',sans-serif;font-size:.85rem" onchange="updateItemPrice(${i},this.value)">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span style="font-weight:700;min-width:24px;text-align:center">${it.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div style="font-weight:700">${it.total.toLocaleString('ar-EG')} ج</div>
        <button class="qty-btn" style="background:#fee2e2;border-color:#fca5a5" onclick="removeItem(${i})">✕</button>
      </div>`).join('');
  }
  let total = currentInvoiceItems.reduce((s,i)=>s+i.total, 0);
  let el = document.getElementById('invoiceTotal');
  if (el) el.innerText = total.toLocaleString('ar-EG') + ' ج';
}

function updateItemPrice(idx, val) {
  let p = parseFloat(val);
  if (!isNaN(p) && p>=0) {
    currentInvoiceItems[idx].sellPrice = p;
    currentInvoiceItems[idx].total = currentInvoiceItems[idx].quantity * p;
    renderCurrentInvoice();
  }
}

function changeQty(idx, delta) {
  let it = currentInvoiceItems[idx];
  let prod = products.find(p=>p.id===it.productId);
  let nq = it.quantity + delta;
  if (nq < 1) { removeItem(idx); return; }
  if (prod && nq > prod.stock) return showToast('❌ الكمية أكبر من المتوفر', 'error');
  it.quantity = nq;
  it.total    = nq * it.sellPrice;
  renderCurrentInvoice();
}

function removeItem(idx) { currentInvoiceItems.splice(idx,1); renderCurrentInvoice(); }
function clearInvoice()  { currentInvoiceItems = []; renderCurrentInvoice(); }

function saveInvoice() {
  let cust = document.getElementById('customerName')?.value.trim();
  if (!cust)                      return showToast('❌ أدخل اسم العميل', 'error');
  if (!currentInvoiceItems.length) return showToast('❌ أضف منتجات للفاتورة', 'error');
  for (let it of currentInvoiceItems) {
    let prod = products.find(p=>p.id===it.productId);
    if (!prod || prod.stock < it.quantity)
      return showToast(`❌ الكمية من "${it.name}" غير متوفرة`, 'error');
  }
  for (let it of currentInvoiceItems) {
    let prod = products.find(p=>p.id===it.productId);
    prod.stock -= it.quantity;
  }
  let total = currentInvoiceItems.reduce((s,i)=>s+i.total, 0);
  let inv = {
    id: Date.now(),
    customer: cust,
    date: new Date().toLocaleString('ar-EG'),
    items: JSON.parse(JSON.stringify(currentInvoiceItems)),
    total
  };
  invoices.unshift(inv);
  saveAll();
  clearInvoice();
  document.getElementById('customerName').value = '';
  showToast('✅ تم حفظ الفاتورة بنجاح');
  switchTab('invoices');
}

function renderInvoicesPage() {
  document.getElementById('contentArea').innerHTML = `
    <div class="section">
      <div class="section-title">📄 الفواتير</div>
      <div class="btn-row" style="margin-bottom:16px">
        <button class="btn btn-warning" onclick="printDailySalesPDF()">🖨️ طباعة مبيعات اليوم</button>
      </div>
      ${buildInvoicesTable(invoices, true)}
    </div>`;
}

function buildInvoicesTable(list, withActions) {
  if (!list.length) return '<div class="empty-state">لا توجد فواتير</div>';
  let rows = list.map((inv,i) => {
    let actions = withActions ? `
      <button class="btn btn-info    btn-sm" onclick="viewInvoice(${inv.id})">👁️</button>
      <button class="btn btn-primary btn-sm" onclick="openEditInvoice(${inv.id})">✏️</button>
      <button class="btn btn-success btn-sm" onclick="printInvoicePDF(${inv.id})">🖨️ PDF</button>
      ${currentUser.role==='admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteInvoice(${inv.id})">🗑️</button>` : ''}` : '';
    return `<tr>
      <td>${i+1}</td>
      <td>${inv.customer}</td>
      <td>${inv.date}</td>
      <td style="font-weight:700">${inv.total.toLocaleString('ar-EG')} ج</td>
      ${withActions ? `<td>${actions}</td>` : ''}
    </tr>`;
  }).join('');
  let extraTh = withActions ? '<th>إجراءات</th>' : '';
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th>${extraTh}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function viewInvoice(id) {
  let inv = invoices.find(i=>i.id===id);
  if (!inv) return;
  let itemsHtml = inv.items.map(it => `
    <tr>
      <td>${it.name}</td>
      <td style="text-align:center">${it.quantity}</td>
      <td>${it.sellPrice.toLocaleString('ar-EG')} ج</td>
      <td style="font-weight:700">${it.total.toLocaleString('ar-EG')} ج</td>
    </tr>`).join('');
  showModal(`
    <div class="modal-title">📋 فاتورة #${inv.id}</div>
    <div style="margin-bottom:10px;color:var(--muted)">العميل: <strong>${inv.customer}</strong> &nbsp;|&nbsp; التاريخ: ${inv.date}</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
        <tbody>${itemsHtml}</tbody>
      </table>
    </div>
    <div style="text-align:left;margin-top:14px;font-size:1.1rem;font-weight:900;color:var(--accent)">
      الإجمالي: ${inv.total.toLocaleString('ar-EG')} ج
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
      <button class="btn btn-success" onclick="printInvoicePDF(${inv.id})">🖨️ طباعة PDF</button>
    </div>`);
}

function openEditInvoice(id) {
  let inv = invoices.find(i=>i.id===id);
  if (!inv) return;
  let fields = inv.items.map((it,i) => `
    <div class="form-group" style="margin-bottom:10px">
      <label>${it.name} (الكمية الحالية: ${it.quantity})</label>
      <input type="number" id="eq_${i}" value="${it.quantity}" min="1" max="${it.quantity + (products.find(p=>p.name===it.name)?.stock||0)}">
    </div>`).join('');
  showModal(`
    <div class="modal-title">✏️ تعديل الفاتورة</div>
    <div class="form-group" style="margin-bottom:14px"><label>اسم العميل</label><input type="text" id="eq_cust" value="${inv.customer}"></div>
    ${fields}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="saveEditInvoice(${id})">💾 حفظ</button>
    </div>`);
}

function saveEditInvoice(id) {
  let inv = invoices.find(i=>i.id===id);
  let nc = document.getElementById('eq_cust').value.trim();
  if (nc) inv.customer = nc;
  for (let i=0; i<inv.items.length; i++) {
    let it = inv.items[i];
    let nq = parseInt(document.getElementById(`eq_${i}`).value);
    if (!isNaN(nq) && nq>0) {
      let prod = products.find(p=>p.name===it.name);
      if (prod) {
        let diff = nq - it.quantity;
        if (diff>0 && prod.stock < diff) return showToast('❌ مخزون غير كافٍ', 'error');
        prod.stock -= diff;
      }
      it.quantity = nq;
      it.total    = nq * it.sellPrice;
    }
  }
  inv.total = inv.items.reduce((s,i)=>s+i.total,0);
  saveAll();
  closeModal();
  renderInvoicesPage();
  showToast('✅ تم تعديل الفاتورة');
}

function deleteInvoice(id) {
  if (!confirm('حذف الفاتورة وإعادة الكميات للمخزون؟')) return;
  let inv = invoices.find(i=>i.id===id);
  if (inv) {
    inv.items.forEach(it => {
      let p = products.find(x=>x.name===it.name);
      if (p) p.stock += it.quantity;
    });
    invoices = invoices.filter(i=>i.id!==id);
    saveAll();
    renderInvoicesPage();
    showToast('✅ تم الحذف وإعادة المخزون');
  }
}

  document.getElementById('contentArea').innerHTML = `
    <div class="section">

            ${invoices.map(inv=>`<option value="${inv.id}">فاتورة #${inv.id} - ${inv.customer} - ${inv.date}</option>`).join('')}
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="loadReturnInvoice()">عرض الفاتورة</button>
      <div id="returnItemsArea" style="margin-top:16px"></div>
    </div>
    <div class="section">
      <div class="section-title">📋 سجل المرتجعات</div>
      <div id="returnsHistory"></div>
    </div>`;
  renderReturnsHistory();
}

function loadReturnInvoice() {
  let id = document.getElementById('retInvoiceSelect').value;
  if (!id) return showToast('❌ اختر فاتورة', 'error');
  let inv = invoices.find(i=>i.id==id);
  if (!inv) return;
  let rows = inv.items.map((it,i) => `
    <tr>
      <td>${it.name}</td>
      <td style="text-align:center">${it.quantity}</td>
      <td>${it.sellPrice.toLocaleString('ar-EG')} ج</td>
      <td><input type="number" id="retQty${i}" min="0" max="${it.quantity}" value="0" style="width:80px;padding:6px;border:1.5px solid var(--border);border-radius:8px;font-family:'Cairo',sans-serif"></td>
    </tr>`).join('');
  document.getElementById('returnItemsArea').innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>المنتج</th><th>الكمية المباعة</th><th>السعر</th><th>كمية الإرجاع</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <input type="hidden" id="returnInvId" value="${inv.id}">
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-success" onclick="processReturn()">✅ تأكيد الإرجاع</button>
    </div>`;
}

function processReturn() {
  let invId = document.getElementById('returnInvId')?.value;
  if (!invId) return showToast('❌ اختر فاتورة', 'error');
  let inv = invoices.find(i=>i.id==invId);
  if (!inv) return;
  let returned=[], total=0;
  for (let i=0; i<inv.items.length; i++) {
    let qty = parseInt(document.getElementById(`retQty${i}`)?.value||0);
    if (qty>0) {
      let prod = products.find(p=>p.name===inv.items[i].name);
      if (prod) prod.stock += qty;
      returned.push({ name:inv.items[i].name, quantity:qty, price:inv.items[i].sellPrice, total:qty*inv.items[i].sellPrice });
      total += qty*inv.items[i].sellPrice;
    }
  }
  if (!returned.length) return showToast('❌ لم تختر أي كمية للإرجاع', 'error');
  returns.unshift({ id:Date.now(), invoiceId:invId, date:new Date().toLocaleString('ar-EG'), items:returned, total });
  saveAll();
  renderReturnsHistory();
  document.getElementById('returnItemsArea').innerHTML = '';
  document.getElementById('retInvoiceSelect').value = '';
  showToast(`✅ تم الإرجاع بقيمة ${total.toLocaleString('ar-EG')} ج`);
}

function renderReturnsHistory() {
  let c = document.getElementById('returnsHistory');
  if (!c) return;
  if (!returns.length) { c.innerHTML = '<div class="empty-state">لا توجد مرتجعات</div>'; return; }
  let rows = returns.map(r=>`
    <tr>
      <td>${r.date}</td>
      <td>#${r.invoiceId}</td>
      <td>${r.items.map(i=>`${i.name} ×${i.quantity}`).join('، ')}</td>
      <td style="font-weight:700">${r.total.toLocaleString('ar-EG')} ج</td>
    </tr>`).join('');
  c.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>التاريخ</th><th>الفاتورة</th><th>المنتجات</th><th>الإجمالي</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ============================================================
// REVENUE PAGE
// ============================================================
function renderRevenuePage() {
  let today      = new Date().toLocaleDateString('ar-EG');
  let now        = new Date();
  let monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  let todayTotal=0, monthTotal=0, allTotal=0;

  invoices.forEach(inv => {
    allTotal += inv.total;
    // مقارنة التاريخ بالتحويل
    let d = new Date(inv.id); // id = timestamp
    if (d >= monthStart) monthTotal += inv.total;
    // لليوم نقارن التاريخ المحفوظ
    if (inv.date && inv.date.startsWith(today)) todayTotal += inv.total;
  });

  let retTotal = returns.reduce((s,r)=>s+r.total,0);

  document.getElementById('contentArea').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-lbl">📅 مبيعات اليوم</div><div class="stat-val">${todayTotal.toLocaleString('ar-EG')} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">🗓️ هذا الشهر</div><div class="stat-val">${monthTotal.toLocaleString('ar-EG')} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">💰 الإجمالي الكلي</div><div class="stat-val">${allTotal.toLocaleString('ar-EG')} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">🔄 المرتجعات</div><div class="stat-val">${retTotal.toLocaleString('ar-EG')} ج</div></div>
      <div class="stat-card"><div class="stat-lbl">📈 صافي الإيرادات</div><div class="stat-val">${(allTotal-retTotal).toLocaleString('ar-EG')} ج</div></div>
    </div>
    <div class="section">
      <div class="section-title">📊 جميع الفواتير</div>
      ${buildInvoicesTable(invoices, false)}
    </div>`;
}

function changePassword(type) {
  let isAdmin = type === 'admin';
  let label   = isAdmin ? 'الأدمن' : 'المستخدم العادي';
  showModal(`
    <div class="modal-title">🔑 تغيير باسورد ${label}</div>
    <div class="form-group" style="margin-bottom:12px"><label>الباسورد الحالي</label><input type="password" id="cp_old" placeholder="اكتب الباسورد الحالي"></div>
    <div class="form-group" style="margin-bottom:12px"><label>الباسورد الجديد</label><input type="password" id="cp_new" placeholder="4 أحرف على الأقل"></div>
    <div class="form-group" style="margin-bottom:12px"><label>تأكيد الباسورد الجديد</label><input type="password" id="cp_confirm" placeholder="اعد كتابة الباسورد الجديد"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="doChangePassword('${type}')">💾 حفظ</button>
    </div>`);
}

function doChangePassword(type) {
  let old     = document.getElementById('cp_old').value;
  let newPass = document.getElementById('cp_new').value;
  let confirm = document.getElementById('cp_confirm').value;
  let isAdmin = type === 'admin';
  let curHash = isAdmin ? adminPassHash : userPassHash;

  if (simpleHash(old) !== curHash) return showToast('❌ الباسورد الحالي غير صحيح', 'error');
  if (newPass.length < 4)          return showToast('❌ الباسورد قصير جداً (4 على الأقل)', 'error');
  if (newPass !== confirm)          return showToast('❌ الباسوردان غير متطابقان', 'error');

  if (isAdmin) adminPassHash = simpleHash(newPass);
  else         userPassHash  = simpleHash(newPass);
  saveAll();
  closeModal();
  showToast('✅ تم تغيير الباسورد بنجاح');
}

// ============================================================
// PDF HELPERS
// ============================================================
function buildPrintElement(innerHtml) {
  let el = document.createElement('div');
  el.style.cssText = `
    padding:24px; font-family:'Cairo',sans-serif; background:white;
    direction:rtl; width:680px; position:relative; overflow:hidden;`;

  // علامة مائية — لوجو واحد كبير في المنتصف
  el.innerHTML = `
    <img src="logo-badran.png"
      style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
             width:420px;height:420px;object-fit:contain;
             opacity:0.08;pointer-events:none;z-index:0;"
      onerror="this.style.display='none'">
    <div style="position:relative;z-index:1">${innerHtml}</div>`;

  document.body.appendChild(el);
  return el;
}

async function exportToPDF(el, filename) {
  try {
    showToast('⏳ جاري إنشاء PDF...');
    const canvas = await html2canvas(el, { scale:2, useCORS:true, backgroundColor:'#ffffff' });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
    const imgData = canvas.toDataURL('image/png');
    const w = 190, h = (canvas.height * w) / canvas.width;
    pdf.addImage(imgData,'PNG',10,10,w,h);
    pdf.save(filename);
    showToast('✅ تم تحميل PDF');
  } catch(e) {
    showToast('❌ فشل إنشاء PDF: ' + e.message, 'error');
  }
  document.body.removeChild(el);
}

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  closeModal();
  let overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'activeModal';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  let m = document.getElementById('activeModal');
  if (m) m.remove();
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg, type) {
  let existing = document.getElementById('toastMsg');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  let t = document.createElement('div');
  t.id = 'toastMsg';
  t.innerText = msg;
  t.style.cssText = `
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${type==='error'?'#ef4444':'#1e293b'};
    color:#fff;padding:12px 28px;border-radius:40px;font-family:'Cairo',sans-serif;
    font-weight:700;font-size:.9rem;z-index:9999;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    animation:fadeInUp .2s ease;`;
  document.body.appendChild(t);
  toastTimer = setTimeout(()=>t.remove(), 3000);
}

// ============================================================
// KEYBOARD SHORTCUT — F2 لرؤية سعر الشراء (أدمن فقط)
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key==='F2' && currentUser?.role==='admin') {
    let hovered = document.querySelector('#productsList tr:hover');
    if (hovered) {
      let name = hovered.cells[1]?.innerText?.replace(/ناقص/,'').trim();
      let p = products.find(x=>name?.includes(x.name));
      if (p) showToast(`💰 سعر شراء "${p.name}": ${p.buyPrice.toLocaleString('ar-EG')} ج`);
    }
  }
  if (e.key==='Escape') closeModal();
});
