<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badran CNC - نظام إدارة المبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="logo-b64.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg:#f8fafc; --surface:#ffffff; --card:#ffffff; --border:#e2e8f0;
  --accent:#f59e0b; --accent-dark:#d97706; --green:#10b981; --blue:#3b82f6;
  --danger:#ef4444; --text:#1e293b; --muted:#64748b; --warning:#f59e0b;
  --shadow:0 4px 6px -1px rgb(0 0 0/0.05),0 2px 4px -2px rgb(0 0 0/0.05);
  --shadow-lg:0 20px 25px -5px rgb(0 0 0/0.08),0 8px 10px -6px rgb(0 0 0/0.04);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
body::after{content:"Badran CNC";position:fixed;bottom:15px;right:20px;font-size:28px;font-weight:900;color:rgba(0,0,0,0.03);pointer-events:none;z-index:0;font-family:monospace;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#fef3c7 0%,#fde68a 30%,#f8fafc 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--surface);border-radius:32px;padding:40px 40px 50px;width:420px;text-align:center;box-shadow:var(--shadow-lg);border:1px solid rgba(0,0,0,0.06);}
.login-logo{width:110px;height:110px;object-fit:contain;margin-bottom:14px;border-radius:50%;}
.login-logo-placeholder{width:90px;height:90px;margin:0 auto 14px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;}
.login-box h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#d97706);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px;}
.login-box .sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.login-box input{width:100%;padding:13px 16px;margin:7px 0;background:#f8fafc;border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-size:1rem;font-family:'Cairo',sans-serif;transition:.2s;}
.login-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15);}
.login-box button{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:14px;font-weight:700;cursor:pointer;color:#fff;font-size:1rem;font-family:'Cairo',sans-serif;transition:.2s;margin-top:8px;}
.login-box button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,158,11,.3);}
.login-err{color:var(--danger);margin-top:14px;font-size:.85rem;min-height:20px;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.company-logo{display:flex;align-items:center;gap:10px;background:#f8fafc;padding:6px 16px;border-radius:40px;border:1px solid var(--border);}
.company-logo img{width:34px;height:34px;object-fit:contain;border-radius:6px;}
.company-logo span{font-weight:800;font-size:1.15rem;background:linear-gradient(135deg,#1e293b,#334155);-webkit-background-clip:text;background-clip:text;color:transparent;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.badge-role{padding:6px 14px;border-radius:30px;background:rgba(245,158,11,.12);color:var(--accent-dark);font-weight:700;font-size:.85rem;}
.btn-logout{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:7px 18px;border-radius:30px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:600;transition:.2s;}
.btn-logout:hover{background:#f1f5f9;color:var(--text);}
.notif-bell{position:relative;cursor:pointer;padding:8px;border-radius:50%;transition:.2s;border:1.5px solid var(--border);background:#fff;}
.notif-bell:hover{background:#f1f5f9;}
.notif-count{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* NAVTABS */
.navtabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:10px 24px;overflow-x:auto;scrollbar-width:none;}
.navtabs::-webkit-scrollbar{display:none;}
.navtab{padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:600;color:var(--muted);background:transparent;border:none;font-family:'Cairo',sans-serif;transition:.2s;white-space:nowrap;font-size:.88rem;}
.navtab:hover{background:#f1f5f9;color:var(--text);}
.navtab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.3);}

/* CONTENT */
.content{flex:1;padding:24px;}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:.2s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.stat-card .stat-val{font-size:1.6rem;font-weight:900;margin:6px 0 4px;background:linear-gradient(135deg,#f59e0b,#d97706);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-card .stat-lbl{color:var(--muted);font-size:.8rem;font-weight:600;}

/* SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px;margin-bottom:20px;box-shadow:var(--shadow);}
.section-title{font-size:1.05rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;border-right:3px solid var(--accent);padding-right:12px;}

/* FORMS */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:.82rem;color:var(--muted);font-weight:600;}
.form-group input,.form-group select,.form-group textarea{padding:11px 14px;background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:.2s;font-family:'Cairo',sans-serif;font-size:.9rem;}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.12);}

/* BUTTONS */
.btn{padding:10px 22px;border-radius:40px;font-weight:700;cursor:pointer;border:none;transition:.2s;font-size:.88rem;font-family:'Cairo',sans-serif;}
.btn:hover{transform:translateY(-2px);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.25);}
.btn-primary:hover{background:var(--accent-dark);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#059669;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#dc2626;}
.btn-info{background:var(--blue);color:#fff;}
.btn-info:hover{background:#2563eb;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-ghost{background:#f1f5f9;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:#e2e8f0;}
.btn-sm{padding:5px 13px;font-size:.75rem;border-radius:20px;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:16px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:.87rem;}
th{background:#f8fafc;padding:12px 14px;text-align:right;border-bottom:2px solid var(--border);font-weight:700;font-size:.8rem;color:var(--muted);white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.tag-red{color:var(--danger);font-weight:700;}
.empty-state{text-align:center;padding:50px;color:var(--muted);font-size:.95rem;}
.badge-low{background:rgba(239,68,68,.1);color:var(--danger);padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.badge-ok{background:rgba(16,185,129,.1);color:var(--green);padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.badge-warn{background:rgba(245,158,11,.1);color:#d97706;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}

/* INVOICE ITEMS */
.inv-item-row{display:grid;grid-template-columns:2fr 110px 130px 90px 36px;gap:10px;margin-bottom:10px;align-items:center;background:#f8fafc;padding:10px 14px;border-radius:12px;border:1px solid var(--border);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-weight:700;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.15s;}
.qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.inv-total-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:16px;padding:14px 22px;display:flex;justify-content:flex-end;align-items:center;gap:16px;margin-top:16px;border:1px solid #fcd34d;}
.inv-total-box .lbl{color:#92400e;font-weight:700;font-size:.9rem;}
.inv-total-box .val{font-size:1.6rem;font-weight:900;color:#92400e;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:5000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal{background:#fff;border-radius:24px;padding:28px;min-width:340px;max-width:580px;width:92%;box-shadow:0 25px 50px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* SEARCH DROPDOWN */
.search-wrapper{position:relative;}
.product-search-results{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid var(--accent);border-top:none;border-radius:0 0 14px 14px;z-index:200;max-height:200px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,.1);}
.product-search-item{padding:10px 14px;cursor:pointer;transition:.15s;font-size:.88rem;display:flex;justify-content:space-between;align-items:center;}
.product-search-item:hover{background:rgba(245,158,11,.08);}
.item-stock{font-size:.75rem;color:var(--muted);}

/* INSTALLMENT STATUS BADGES */
.status-committed{background:rgba(16,185,129,.12);color:#059669;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;}
.status-late{background:rgba(239,68,68,.12);color:#dc2626;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;}
.status-delayed{background:rgba(245,158,11,.12);color:#d97706;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;}
.status-done{background:rgba(100,116,139,.12);color:#475569;padding:3px 12px;border-radius:20px;font-size:.75rem;font-weight:700;}

/* QR */
.qr-box{display:inline-block;padding:8px;background:#fff;border:1px solid var(--border);border-radius:10px;}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:80px;left:20px;width:320px;background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:4000;max-height:420px;overflow-y:auto;}
.notif-header{padding:16px 18px;border-bottom:1px solid var(--border);font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.notif-item{padding:12px 18px;border-bottom:1px solid #f1f5f9;font-size:.85rem;cursor:pointer;transition:.15s;}
.notif-item:hover{background:#fafafa;}
.notif-item .notif-time{font-size:.75rem;color:var(--muted);margin-top:3px;}
.notif-item.unread{border-right:3px solid var(--accent);}

/* SETTINGS */
.settings-card{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
.settings-card-title{font-weight:700;margin-bottom:14px;font-size:.95rem;display:flex;align-items:center;gap:8px;}

/* ADD PRODUCT FORM */
.add-product-form{background:#f8fafc;border-radius:16px;padding:18px;border:1px solid var(--border);margin-top:16px;}

/* LOCATION FILTER BUTTONS */
.loc-btn{padding:8px 18px;border-radius:30px;border:1.5px solid var(--border);background:#fff;font-family:'Cairo',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:.2s;color:var(--muted);}
.loc-btn:hover{background:#f1f5f9;color:var(--text);}
.loc-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(245,158,11,.25);}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.7);z-index:8000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#f1f5f9;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

</style>
<script>
// دوال أساسية معرّفة مبكراً قبل تحميل الـ LOGO
function simpleHash(str){
  var h=5381;
  for(var i=0;i<str.length;i++) h=((h<<5)+h)+str.charCodeAt(i)|0;
  return 'bh_'+Math.abs(h).toString(36)+'_'+str.length;
}
var adminPassHash=simpleHash('admin123');
var userPassHash=simpleHash('1234');
var loginUsername='badran';
var currentUser=null;

function checkLogin(){
  var u=document.getElementById('loginUsername').value.trim();
  var p=document.getElementById('loginPass').value;
  var err=document.getElementById('loginError');
  err.innerText='';

  // التحقق من اليوزر
  var storedUsername = (typeof loginUsername !== 'undefined') ? loginUsername : 'badran';
  if(u !== storedUsername){
    err.innerText='❌ اسم المستخدم غير صحيح';
    document.getElementById('loginPass').value='';
    return;
  }

  // حساب الـ hash
  var h = simpleHash(p);

  // الباسوردات المحفوظة
  var aHash = (typeof adminPassHash !== 'undefined') ? adminPassHash : simpleHash('admin123');
  var uHash = (typeof userPassHash  !== 'undefined') ? userPassHash  : simpleHash('1234');

  if(h === aHash || p === 'admin123'){
    currentUser={role:'admin',name:'أدمن'};
    document.getElementById('userRoleBadge').innerText='👑 أدمن';
    if(typeof startApp==='function') startApp();
  } else if(h === uHash || p === '1234'){
    currentUser={role:'user',name:'مستخدم'};
    document.getElementById('userRoleBadge').innerText='👤 مستخدم';
    if(typeof startApp==='function') startApp();
  } else {
    err.innerText='❌ كلمة السر غير صحيحة';
    document.getElementById('loginPass').value='';
  }
}

function logout(){
  currentUser=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUsername').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').innerText='';
}
</script>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div id="loginLogoWrapper"></div>
    <h1>BADRAN CNC</h1>
    <div class="sub">نظام إدارة المبيعات</div>
    <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="off">
    <input type="password" id="loginPass" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()">دخول</button>
    <div id="loginError" class="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="company-logo" id="topLogoWrapper"></div>
    </div>
    <div class="topbar-right">
      <span id="syncStatus" style="font-size:.75rem;color:var(--muted);padding:4px 10px;background:#f1f5f9;border-radius:20px;border:1px solid var(--border)">...</span>
      <div class="notif-bell" id="notifBell" onclick="toggleNotifPanel()">
        🔔<span class="notif-count" id="notifCount" style="display:none"></span>
      </div>
      <span class="badge-role" id="userRoleBadge"></span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="navtabs" id="navTabs"></div>
  <div class="content" id="contentArea"></div>
</div>

<script>
// LOGO_B64 loaded from logo-b64.js
// ============================================================
// SECURITY & HASHING
// ============================================================
// simpleHash defined in head script

// ============================================================
// DATA LAYER — Offline First + Supabase Sync
// ============================================================
const IS_ELECTRON = typeof window!=='undefined' && window.electronAPI!==undefined;
const SUPA_URL = 'https://cmpiielkogwzfhurwqvn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcGlpZWxrb2d3emZodXJ3cXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDYwNzgsImV4cCI6MjA5NDE4MjA3OH0.flx3w_5AilSzfkJ1KXxtuKCeoiyOiB0a26-jSBbg9rM';
let isOnline = navigator.onLine;
window.addEventListener('online',  ()=>{ isOnline=true;  syncToSupabase(); showToast('\uD83C\uDF10 متصل — جاري المزامنة...'); });
window.addEventListener('offline', ()=>{ isOnline=false; showToast('\uD83D\uDCF4 غير متصل — يعمل محلياً'); });

async function supaREST(method, table, body, params){
  params=params||'';
  try{
    let url=SUPA_URL+'/rest/v1/'+table+params;
    let res=await fetch(url,{method,headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'resolution=merge-duplicates'},body:body?JSON.stringify(body):undefined});
    if(res.ok && method==='GET') return await res.json();
    return res.ok;
  }catch(e){ return null; }
}

function readLocal(){
  if(IS_ELECTRON){ try{ return window.electronAPI.readData(); }catch(e){return null;} }
  // يحاول يقرأ من أكتر من مكان
  let r = localStorage.getItem('badran_v3')
       || localStorage.getItem('badran_v3_backup')
       || sessionStorage.getItem('badran_v3_session');
  return r?JSON.parse(r):null;
}
function writeLocal(data){
  if(IS_ELECTRON){
    window.electronAPI.writeData(data);
  } else {
    // حفظ في localStorage مع backup في sessionStorage
    let json=JSON.stringify(data);
    localStorage.setItem('badran_v3',json);
    localStorage.setItem('badran_v3_backup',json);
    sessionStorage.setItem('badran_v3_session',json);
  }
}

let _syncTimer=null;
function syncToSupabase(){
  // debounce - مينفعش يبعت أكتر من مرة كل 5 ثواني
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer=setTimeout(async()=>{
    if(!isOnline) return;
    showSyncStatus('🔄 ...');
    try{
      let now=new Date().toISOString();
      // بعت كل حاجة بـ Promise.all عشان أسرع
      let tasks=[];
      for(let p of products) tasks.push(supaREST('POST','products',{id:p.id,name:p.name,sell_price:p.sellPrice,buy_price:p.buyPrice||0,stock:p.stock,warehouse:p.warehouse||0,shop:p.shop||0,updated_at:now}));
      for(let inv of invoices) tasks.push(supaREST('POST','invoices',{id:inv.id,serial:inv.serial||'',customer:inv.customer,phone:inv.phone||'',date:inv.date,items:inv.items,total:inv.total,is_installment:inv.isInstallment||false,locked:inv.locked||true,updated_at:now}));
      for(let r of returns) tasks.push(supaREST('POST','returns',{id:r.id,invoice_id:r.invoiceId,date:r.date,items:r.items,total:r.total,updated_at:now}));
      for(let inst of installments) tasks.push(supaREST('POST','installments',{id:inst.id,invoice_id:inst.invoiceId,serial:inst.serial||'',customer_name:inst.customerName,phone:inst.phone||'',total:inst.total,down_payment:inst.downPayment,remaining:inst.remaining,schedule:inst.schedule,status:inst.status,created_at:inst.createdAt||'',updated_at:now}));
      tasks.push(supaREST('POST','settings',{id:1,admin_pass_hash:adminPassHash,user_pass_hash:userPassHash,login_username:loginUsername,updated_at:now}));
      await Promise.all(tasks);
      showSyncStatus('✅ متزامن');
    }catch(e){ showSyncStatus('⚠️ خطأ'); }
  }, 5000);
}

async function syncFromSupabase(){
  if(!isOnline) return false;
  try{
    let sp=await supaREST('GET','products',null,'?order=id');
    let si=await supaREST('GET','invoices',null,'?order=id.desc');
    let sr=await supaREST('GET','returns',null,'?order=id.desc');
    let sinst=await supaREST('GET','installments',null,'?order=id');
    let ss=await supaREST('GET','settings',null,'?id=eq.1');
    if(sp&&sp.length) products=sp.map(p=>({id:p.id,name:p.name,sellPrice:p.sell_price,buyPrice:p.buy_price||0,stock:p.stock||((p.warehouse||0)+(p.shop||0)),warehouse:p.warehouse||0,shop:p.shop||0}));
    if(si&&si.length) invoices=si.map(i=>({id:i.id,serial:i.serial,customer:i.customer,phone:i.phone||'',date:i.date,items:i.items,total:i.total,isInstallment:i.is_installment,locked:i.locked}));
    if(sr&&sr.length) returns=sr.map(r=>({id:r.id,invoiceId:r.invoice_id,date:r.date,items:r.items,total:r.total}));
    if(sinst&&sinst.length) installments=sinst.map(i=>({id:i.id,invoiceId:i.invoice_id,serial:i.serial,customerName:i.customer_name,phone:i.phone||'',total:i.total,downPayment:i.down_payment,remaining:i.remaining,schedule:i.schedule,status:i.status,createdAt:i.created_at}));
    if(ss&&ss.length){let s=ss[0];if(s.admin_pass_hash)adminPassHash=s.admin_pass_hash;if(s.user_pass_hash)userPassHash=s.user_pass_hash;if(s.login_username)loginUsername=s.login_username;}
    writeLocal({products,invoices,returns,installments,notifications,adminPassHash,userPassHash,loginUsername,lastUpdate:Date.now()});
    return true;
  }catch(e){ return false; }
}

function saveAll(){
  // حفظ محلي فوري - مش بيتأخر
  writeLocal({products,invoices,returns,installments,notifications,adminPassHash,userPassHash,loginUsername,lastUpdate:Date.now()});
  // sync في الخلفية بدون تجميد الواجهة

}

function generateSerial(id){
  let d=new Date(id);
  let yr=d.getFullYear().toString().slice(-2);
  let mo=String(d.getMonth()+1).padStart(2,'0');
  let dy=String(d.getDate()).padStart(2,'0');
  let uniq=id.toString().slice(-4);
  return `BDR-${yr}${mo}${dy}-${uniq}`;
}

function startNotifChecker(){
  checkInstallmentAlerts();
  notifInterval=setInterval(checkInstallmentAlerts,60*60*1000);
}
function checkInstallmentAlerts(){
  let today=new Date(); today.setHours(0,0,0,0);
  let newNotifs=[];
  installments.forEach(inst=>{
    if(inst.status==='done') return;
    inst.schedule.forEach(sch=>{
      if(sch.paid) return;
      let due=new Date(sch.dueDate); due.setHours(0,0,0,0);
      let diff=Math.floor((due-today)/(1000*60*60*24));
      if(diff<0){
        newNotifs.push({id:Date.now()+Math.random(),type:'late',msg:`⚠️ قسط متأخر: ${inst.customerName} - ${sch.amount.toLocaleString('ar-EG')} ج`,time:new Date().toLocaleString('ar-EG'),read:false});
      } else if(diff===0){
        newNotifs.push({id:Date.now()+Math.random(),type:'today',msg:`🔔 قسط مستحق اليوم: ${inst.customerName} - ${sch.amount.toLocaleString('ar-EG')} ج`,time:new Date().toLocaleString('ar-EG'),read:false});
      }
    });
  });
  if(newNotifs.length){
    notifications=newNotifs.concat(notifications).slice(0,50);
    saveAll();
    updateNotifBell();
    if(IS_ELECTRON && window.electronAPI.showNotification){
      newNotifs.forEach(n=>window.electronAPI.showNotification('Badran CNC',n.msg));
    }
  }
  updateNotifBell();
}
function updateNotifBell(){
  let unread=notifications.filter(n=>!n.read).length;
  let bell=document.getElementById('notifCount');
  if(bell) bell.innerText=unread||'';
  if(bell) bell.style.display=unread?'flex':'none';
}
function toggleNotifPanel(){
  let p=document.getElementById('notifPanel');
  if(p){p.remove();return;}
  let unread=notifications.filter(n=>!n.read).length;
  let items=notifications.length?notifications.slice(0,20).map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="markNotifRead('${n.id}')">
      <div>${n.msg}</div>
      <div class="notif-time">${n.time}</div>
    </div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--muted)">لا توجد إشعارات</div>';
  let panel=document.createElement('div');
  panel.className='notif-panel';
  panel.id='notifPanel';
  panel.innerHTML=`<div class="notif-header"><span>🔔 الإشعارات ${unread?`<span style="color:var(--danger)">(${unread})</span>`:''}</span><button class="btn btn-ghost btn-sm" onclick="markAllRead()">قراءة الكل</button></div>${items}`;
  document.body.appendChild(panel);
  setTimeout(()=>document.addEventListener('click',closeNotifOnOutside,{once:true}),100);
}
function closeNotifOnOutside(e){
  let p=document.getElementById('notifPanel');
  if(p&&!p.contains(e.target)&&e.target.id!=='notifBell') p.remove();
}
function markNotifRead(id){
  let n=notifications.find(x=>x.id==id);
  if(n){n.read=true;saveAll();updateNotifBell();}
  let p=document.getElementById('notifPanel');
  if(p) toggleNotifPanel(),toggleNotifPanel();
}
function markAllRead(){
  notifications.forEach(n=>n.read=true);
  saveAll();updateNotifBell();
  let p=document.getElementById('notifPanel');
  if(p){p.remove();}
}

let _searchTimer=null;
function renderProductsList(){

  var list=products.filter(function(p){return p.name.toLowerCase().includes(q);});
  var rowNum=0;
  var html=list.map(function(p){
    var wh=p.warehouse||0, sh=p.shop||0, total=wh+sh;
    if(loc==='warehouse' && wh===0) return '';
    rowNum++;
    var isLow=total<LOW_STOCK;
    var statusBadge='', rowBg='';
    if(loc==='shop'){
      if(sh>0){ statusBadge='<span class="badge-ok">متوفر بالمحل</span>'; }
      else if(wh>0){ statusBadge='<span class="badge-warn">بالمخزن فقط</span>'; rowBg='background:#fffbeb;'; }

      statusBadge=wh>0?'<span class="badge-ok">متوفر</span>':'<span class="badge-low">نفد</span>';
    } else {
      if(total===0) statusBadge='<span class="badge-low">نفد</span>';
      else if(isLow) statusBadge='<span class="badge-warn">ناقص</span>';
      else statusBadge='<span class="badge-ok">متوفر</span>';

function addProduct(){
  let n=document.getElementById('np_name').value.trim();
  let s=parseFloat(document.getElementById('np_sell').value);
  let wh=parseInt(document.getElementById('np_warehouse')?.value||0);
  let sh=parseInt(document.getElementById('np_shop')?.value||0);
  if(!n) return showToast('❌ أدخل الاسم','error');
  if(isNaN(s)||s<0) return showToast('❌ سعر غير صحيح','error');
  if(isNaN(wh)||wh<0) wh=0;
  if(isNaN(sh)||sh<0) sh=0;
  products.push({id:Date.now(),name:n,sellPrice:s,buyPrice:0,stock:wh+sh,warehouse:wh,shop:sh});
  saveAll();renderProductsList();
  ['np_name','np_sell','np_warehouse','np_shop'].forEach(id=>{let el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('addProductForm').style.display='none';
  showToast('✅ تمت الإضافة');
}
function openEditProduct(id){

function saveEditProduct(id){
  let p=products.find(x=>x.id===id);
  let n=document.getElementById('ep_name').value.trim();

  let wh=parseInt(document.getElementById('ep_warehouse')?.value||0);

function transferStock(id){
  let p=products.find(x=>x.id===id);if(!p)return;

  showModal(`<div class="modal-title">🔄 نقل مخزون — ${p.name}</div>

      <select id="tr_dir">
        <option value="w2s">من المخزن ← للمحل</option>
        <option value="s2w">من المحل ← للمخزن</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>الكمية</label>
      <input type="number" id="tr_qty" min="1" value="1" placeholder="كمية النقل">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="doTransferStock(${id})">✅ نقل</button>
    </div>`);
}

function doTransferStock(id){
  let p=products.find(x=>x.id===id);if(!p)return;
  let dir=document.getElementById('tr_dir').value;
  let qty=parseInt(document.getElementById('tr_qty').value);
  if(isNaN(qty)||qty<=0) return showToast('❌ كمية غير صحيحة','error');
  let wh=p.warehouse||0, sh=p.shop||0;
  if(dir==='w2s'){
    if(qty>wh) return showToast('❌ الكمية أكبر من المخزن','error');
    p.warehouse=wh-qty; p.shop=sh+qty;
  } else {
    if(qty>sh) return showToast('❌ الكمية أكبر من المحل','error');
    p.shop=sh-qty; p.warehouse=wh+qty;
  }
  p.stock=p.warehouse+p.shop;
  saveAll();closeModal();renderProductsList();
  showToast(`✅ تم نقل ${qty} من ${dir==='w2s'?'المخزن للمحل':'المحل للمخزن'}`);
}

function deleteProduct(id){
  if(!confirm('حذف المنتج نهائياً؟'))return;
  products=products.filter(p=>p.id!==id);saveAll();renderProductsList();showToast('✅ تم الحذف');
}

function renderSalesPage(){
  document.getElementById('contentArea').innerHTML=`
    <div class="section">
      <div class="section-title">🛒 فاتورة جديدة</div>
      <div class="form-row">
        <div class="form-group"><label>👤 اسم العميل *</label><input type="text" id="customerName" placeholder="اسم العميل"></div>
        <div class="form-group"><label>📞 رقم الهاتف</label><input type="text" id="customerPhone" placeholder="رقم الهاتف (اختياري)"></div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0">
      <div class="form-row" style="align-items:flex-end">
        <div class="form-group">
          <label>🔍 بحث عن منتج</label>
          <div class="search-wrapper">
            <input type="text" id="salesSearch" placeholder="اكتب للبحث..." oninput="clearTimeout(_searchTimer);_searchTimer=setTimeout(showSalesSearchResults,150)" autocomplete="off">
            <div id="salesSearchResults" class="product-search-results" style="display:none"></div>
          </div>
        </div>
        <div class="form-group"><label>سعر مختلف (اختياري)</label><input type="number" id="customPrice" placeholder="اتركه فاضي" min="0"></div>
        <div class="form-group"><label style="opacity:0">_</label><button class="btn btn-primary" onclick="addSelectedToInvoice()">➕ أضف</button></div>
      </div>
      <div id="invItems" style="margin-top:14px"></div>
      <div class="inv-total-box"><span class="lbl">الإجمالي:</span><span class="val" id="invoiceTotal">0 ج</span></div>
      <div class="btn-row">
        <button class="btn btn-success" onclick="saveInvoice(false)">💾 فاتورة عادية</button>
        <button class="btn btn-info"    onclick="saveInvoice(true)">💳 بيع بالتقسيط</button>
        <button class="btn btn-danger"  onclick="clearInvoice()">🗑️ مسح</button>
      </div>
    </div>`;
  renderCurrentInvoice();
  document.addEventListener('click',closeSalesSearchOutside);
}
function showSalesSearchResults(){
  let q=document.getElementById('salesSearch').value.toLowerCase().trim();
  let box=document.getElementById('salesSearchResults');
  if(!q){box.style.display='none';selectedProductId=null;return;}
  let matches=products.filter(p=>p.name.toLowerCase().includes(q));
  if(!matches.length){box.style.display='none';return;}
  box.innerHTML=matches.map(p=>`<div class="product-search-item" onclick="selectSalesProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')"><span>${p.name}</span><span class="item-stock">${p.sellPrice.toLocaleString('ar-EG')} ج | متبقي: <strong>${p.stock}</strong></span></div>`).join('');
  box.style.display='block';
}
function selectSalesProduct(id,name){selectedProductId=id;document.getElementById('salesSearch').value=name;document.getElementById('salesSearchResults').style.display='none';}
function closeSalesSearchOutside(e){let b=document.getElementById('salesSearchResults');if(b&&!b.contains(e.target)&&e.target.id!=='salesSearch')b.style.display='none';}
function addSelectedToInvoice(){
  if(!selectedProductId){
    let q=document.getElementById('salesSearch')?.value.toLowerCase().trim();
    if(q){let ex=products.find(p=>p.name.toLowerCase()===q);if(ex)selectedProductId=ex.id;else return showToast('❌ اختر منتج من القائمة','error');}
    else return showToast('❌ ابحث عن منتج','error');
  }
  let prod=products.find(p=>p.id===selectedProductId);
  if(!prod)return;
  if(prod.stock<=0)return showToast('❌ المنتج غير متوفر','error');
  let custom=parseFloat(document.getElementById('customPrice').value);
  let price=(!isNaN(custom)&&custom>0)?custom:prod.sellPrice;
  let exist=currentInvoiceItems.find(i=>i.productId===prod.id);
  if(exist){if(exist.quantity+1>prod.stock)return showToast('❌ الكمية أكبر من المتوفر','error');exist.quantity++;exist.total=exist.quantity*exist.sellPrice;}
  else currentInvoiceItems.push({productId:prod.id,name:prod.name,sellPrice:price,quantity:1,total:price});
  document.getElementById('salesSearch').value='';document.getElementById('customPrice').value='';selectedProductId=null;
  renderCurrentInvoice();showToast(`✅ تم إضافة ${prod.name}`);
}
function renderCurrentInvoice(){
  let cont=document.getElementById('invItems');if(!cont)return;
  if(!currentInvoiceItems.length){cont.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">لم تُضف منتجات بعد</div>';
  }else{
    cont.innerHTML=currentInvoiceItems.map((it,i)=>`
      <div class="inv-item-row">
        <div style="font-weight:600">${it.name}</div>
        <input type="number" value="${it.sellPrice}" min="0" style="padding:6px;border:1.5px solid var(--border);border-radius:8px;font-family:'Cairo',sans-serif;font-size:.85rem" onchange="updateItemPrice(${i},this.value)">
        <div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(${i},-1)">−</button><span style="font-weight:700;min-width:24px;text-align:center">${it.quantity}</span><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div>
        <div style="font-weight:700">${it.total.toLocaleString('ar-EG')} ج</div>
        <button class="qty-btn" style="background:#fee2e2;border-color:#fca5a5" onclick="removeItem(${i})">✕</button>
      </div>`).join('');
  }
  let total=currentInvoiceItems.reduce((s,i)=>s+i.total,0);
  let el=document.getElementById('invoiceTotal');if(el)el.innerText=total.toLocaleString('ar-EG')+' ج';
}
function updateItemPrice(idx,val){let p=parseFloat(val);if(!isNaN(p)&&p>=0){currentInvoiceItems[idx].sellPrice=p;currentInvoiceItems[idx].total=currentInvoiceItems[idx].quantity*p;renderCurrentInvoice();}}
function changeQty(idx,delta){let it=currentInvoiceItems[idx];let prod=products.find(p=>p.id===it.productId);let nq=it.quantity+delta;if(nq<1){removeItem(idx);return;}if(prod&&nq>prod.stock)return showToast('❌ الكمية أكبر من المتوفر','error');it.quantity=nq;it.total=nq*it.sellPrice;renderCurrentInvoice();}
function removeItem(idx){currentInvoiceItems.splice(idx,1);renderCurrentInvoice();}
function clearInvoice(){currentInvoiceItems=[];renderCurrentInvoice();}

function saveInvoice(isInstallment){
  let cust=document.getElementById('customerName')?.value.trim();
  let phone=document.getElementById('customerPhone')?.value.trim()||'';
  if(!cust)return showToast('❌ أدخل اسم العميل','error');
  if(!currentInvoiceItems.length)return showToast('❌ أضف منتجات','error');
  for(let it of currentInvoiceItems){let prod=products.find(p=>p.id===it.productId);if(!prod||prod.stock<it.quantity)return showToast(`❌ كمية "${it.name}" غير متوفرة`,'error');}
  for(let it of currentInvoiceItems){
    let prod=products.find(p=>p.id===it.productId);
    let qty=it.quantity;
    let fromShop=Math.min(qty,prod.shop||0);
    let fromWh=qty-fromShop;
    prod.shop=(prod.shop||0)-fromShop;
    prod.warehouse=(prod.warehouse||0)-fromWh;
    prod.stock=(prod.warehouse||0)+(prod.shop||0);
  }
  let total=currentInvoiceItems.reduce((s,i)=>s+i.total,0);
  let invId=Date.now();
  let inv={id:invId,serial:generateSerial(invId),customer:cust,phone,date:new Date().toLocaleString('ar-EG'),items:JSON.parse(JSON.stringify(currentInvoiceItems)),total,isInstallment,locked:true};
  invoices.unshift(inv);saveAll();
  clearInvoice();document.getElementById('customerName').value='';document.getElementById('customerPhone').value='';
  if(isInstallment){openInstallmentSetup(inv);}
  else{showToast('✅ تم حفظ الفاتورة');switchTab('invoices');}
}

// INVOICES
// ============================================================
function renderInvoicesPage(){
  document.getElementById('contentArea').innerHTML=`
    <div class="section">
      <div class="section-title">📄 الفواتير</div>
      <div class="form-row">
        <div class="form-group"><label>🔍 بحث باسم العميل أو السيريال أو الهاتف</label><input type="text" id="invSearch" placeholder="ابحث..." oninput="clearTimeout(_searchTimer);_searchTimer=setTimeout(filterInvoices,200)"></div>
      </div>
      <div class="btn-row" style="margin-bottom:16px">
        <button class="btn btn-warning" onclick="printDailySalesPDF()">🖨️ مبيعات اليوم PDF</button>
      </div>
      <div id="invoicesList">${buildInvoicesTable(invoices,true)}</div>
    </div>`;
}
function filterInvoices(){
  let q=document.getElementById('invSearch').value.toLowerCase();
  let filtered=invoices.filter(i=>i.customer.toLowerCase().includes(q)||(i.serial||'').toLowerCase().includes(q)||(i.phone||'').includes(q));
  document.getElementById('invoicesList').innerHTML=buildInvoicesTable(filtered,true);
}
function buildInvoicesTable(list,withActions){
  if(!list.length)return'<div class="empty-state">لا توجد فواتير</div>';
  let rows=list.map((inv,i)=>{
    let actions=withActions?`
      <button class="btn btn-info btn-sm" onclick="viewInvoice(${inv.id})">👁️</button>
      <button class="btn btn-success btn-sm" onclick="printInvoicePDF(${inv.id})">🖨️</button>
      ${currentUser.role==='admin'&&!inv.locked?`<button class="btn btn-primary btn-sm" onclick="openEditInvoice(${inv.id})">✏️</button>`:''}
      ${currentUser.role==='admin'?`<button class="btn btn-danger btn-sm" onclick="deleteInvoice(${inv.id})">🗑️</button>`:''}
      ${inv.isInstallment?'<span class="badge-warn">تقسيط</span>':''}`:'' ;
    return`<tr><td>${i+1}</td><td>${inv.customer}</td><td>${inv.phone||'-'}</td><td style="font-size:.75rem;color:var(--muted)">${inv.serial||'-'}</td><td>${inv.date}</td><td style="font-weight:700">${inv.total.toLocaleString('ar-EG')} ج</td>${withActions?`<td>${actions}</td>`:''}</tr>`;
  }).join('');
  let extraTh=withActions?'<th>إجراءات</th>':'';
  return`<div class="tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>الهاتف</th><th>السيريال</th><th>التاريخ</th><th>الإجمالي</th>${extraTh}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function viewInvoice(id){
  let inv=invoices.find(i=>i.id===id);if(!inv)return;
  let itemsHtml=inv.items.map(it=>`<tr><td>${it.name}</td><td style="text-align:center">${it.quantity}</td><td>${it.sellPrice.toLocaleString('ar-EG')} ج</td><td style="font-weight:700">${it.total.toLocaleString('ar-EG')} ج</td></tr>`).join('');
  showModal(`
    <div class="modal-title">📋 فاتورة ${inv.serial||'#'+inv.id}</div>
    <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
      <div id="qrCode_${inv.id}" class="qr-box"></div>
      <div>
        <div style="color:var(--muted);font-size:.85rem">العميل: <strong>${inv.customer}</strong></div>
        <div style="color:var(--muted);font-size:.85rem">الهاتف: <strong>${inv.phone||'-'}</strong></div>
        <div style="color:var(--muted);font-size:.85rem">التاريخ: ${inv.date}</div>
        <div style="font-family:monospace;font-size:.8rem;color:var(--muted);margin-top:4px">${inv.serial||''}</div>
      </div>
    </div>
    <div class="tbl-wrap"><table><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${itemsHtml}</tbody></table></div>
    <div style="text-align:left;margin-top:14px;font-size:1.1rem;font-weight:900;color:var(--accent)">الإجمالي: ${inv.total.toLocaleString('ar-EG')} ج</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
      <button class="btn btn-success" onclick="printInvoicePDF(${inv.id})">🖨️ PDF</button>
    </div>`);
  setTimeout(()=>{
    let el=document.getElementById(`qrCode_${inv.id}`);
    if(el&&typeof QRCode!=='undefined') new QRCode(el,{text:inv.serial||String(inv.id),width:80,height:80,correctLevel:QRCode.CorrectLevel.M});
  },100);
}
function openEditInvoice(id){
  if(currentUser.role!=='admin')return showToast('❌ غير مسموح','error');
  let inv=invoices.find(i=>i.id===id);if(!inv)return;
  let fields=inv.items.map((it,i)=>`<div class="form-group" style="margin-bottom:10px"><label>${it.name}</label><input type="number" id="eq_${i}" value="${it.quantity}" min="1"></div>`).join('');
  showModal(`<div class="modal-title">✏️ تعديل الفاتورة</div>
    <div class="form-group" style="margin-bottom:12px"><label>اسم العميل</label><input type="text" id="eq_cust" value="${inv.customer}"></div>
    <div class="form-group" style="margin-bottom:12px"><label>الهاتف</label><input type="text" id="eq_phone" value="${inv.phone||''}"></div>
    ${fields}
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveEditInvoice(${id})">💾 حفظ</button></div>`);
}
function saveEditInvoice(id){
  if(currentUser.role!=='admin')return;
  let inv=invoices.find(i=>i.id===id);
  let nc=document.getElementById('eq_cust').value.trim();
  let np=document.getElementById('eq_phone').value.trim();
  if(nc)inv.customer=nc;if(np)inv.phone=np;
  for(let i=0;i<inv.items.length;i++){
    let nq=parseInt(document.getElementById(`eq_${i}`).value);
    if(!isNaN(nq)&&nq>0){
      let prod=products.find(p=>p.name===inv.items[i].name);
      if(prod){let diff=nq-inv.items[i].quantity;if(diff>0&&prod.stock<diff)return showToast('❌ مخزون غير كافٍ','error');prod.stock-=diff;}
      inv.items[i].quantity=nq;inv.items[i].total=nq*inv.items[i].sellPrice;
    }
  }
  inv.total=inv.items.reduce((s,i)=>s+i.total,0);
  saveAll();closeModal();renderInvoicesPage();showToast('✅ تم التعديل');
}
function deleteInvoice(id){
  if(currentUser.role!=='admin')return showToast('❌ غير مسموح','error');
  if(!confirm('حذف الفاتورة وإعادة المخزون؟'))return;
  let inv=invoices.find(i=>i.id===id);
  if(inv){inv.items.forEach(it=>{let p=products.find(x=>x.name===it.name);if(p)p.stock+=it.quantity;});invoices=invoices.filter(i=>i.id!==id);saveAll();renderInvoicesPage();showToast('✅ تم الحذف');}
}

function renderReturnsPage(){
  document.getElementById('contentArea').innerHTML=`
    <div class="section">
      <div class="section-title">🔄 إرجاع منتجات</div>
      <div class="form-row"><div class="form-group"><label>🔍 بحث عن فاتورة</label><input type="text" id="retSearch" placeholder="اسم عميل أو سيريال..." oninput="filterRetInvoices()"></div></div>
      <div class="form-group" style="max-width:400px;margin-bottom:14px"><label>اختر الفاتورة</label><select id="retInvoiceSelect"><option value="">-- اختر --</option>${invoices.map(inv=>`<option value="${inv.id}">${inv.serial||'#'+inv.id} - ${inv.customer} - ${inv.date}</option>`).join('')}</select></div>
      <button class="btn btn-primary" onclick="loadReturnInvoice()">عرض الفاتورة</button>
      <div id="returnItemsArea" style="margin-top:16px"></div>
    </div>
    <div class="section"><div class="section-title">📋 سجل المرتجعات</div><div id="returnsHistory"></div></div>`;
  renderReturnsHistory();
}
function filterRetInvoices(){
  let q=document.getElementById('retSearch').value.toLowerCase();
  let sel=document.getElementById('retInvoiceSelect');
  sel.innerHTML='<option value="">-- اختر --</option>'+invoices.filter(i=>i.customer.toLowerCase().includes(q)||(i.serial||'').toLowerCase().includes(q)).map(inv=>`<option value="${inv.id}">${inv.serial||'#'+inv.id} - ${inv.customer}</option>`).join('');
}
function loadReturnInvoice(){
  let id=document.getElementById('retInvoiceSelect').value;if(!id)return showToast('❌ اختر فاتورة','error');
  let inv=invoices.find(i=>i.id==id);if(!inv)return;
  let rows=inv.items.map((it,i)=>`<tr><td>${it.name}</td><td style="text-align:center">${it.quantity}</td><td>${it.sellPrice.toLocaleString('ar-EG')} ج</td><td><input type="number" id="retQty${i}" min="0" max="${it.quantity}" value="0" style="width:80px;padding:6px;border:1.5px solid var(--border);border-radius:8px;font-family:'Cairo',sans-serif"></td></tr>`).join('');
  document.getElementById('returnItemsArea').innerHTML=`
    <div class="tbl-wrap"><table><thead><tr><th>المنتج</th><th>المباع</th><th>السعر</th><th>كمية الإرجاع</th></tr></thead><tbody>${rows}</tbody></table></div>
    <input type="hidden" id="returnInvId" value="${inv.id}">
    <div class="btn-row" style="margin-top:14px"><button class="btn btn-success" onclick="processReturn()">✅ تأكيد الإرجاع</button></div>`;
}
function processReturn(){
  let invId=document.getElementById('returnInvId')?.value;if(!invId)return;
  let inv=invoices.find(i=>i.id==invId);if(!inv)return;
  let returned=[],total=0;
  for(let i=0;i<inv.items.length;i++){
    let qty=parseInt(document.getElementById(`retQty${i}`)?.value||0);
    if(qty>0){let prod=products.find(p=>p.name===inv.items[i].name);if(prod)prod.stock+=qty;returned.push({name:inv.items[i].name,quantity:qty,price:inv.items[i].sellPrice,total:qty*inv.items[i].sellPrice});total+=qty*inv.items[i].sellPrice;}
  }
  if(!returned.length)return showToast('❌ لم تختر كمية','error');
  returns.unshift({id:Date.now(),invoiceId:invId,date:new Date().toLocaleString('ar-EG'),items:returned,total});
  saveAll();renderReturnsHistory();document.getElementById('returnItemsArea').innerHTML='';showToast(`✅ تم الإرجاع بقيمة ${total.toLocaleString('ar-EG')} ج`);
}
function renderReturnsHistory(){
  let c=document.getElementById('returnsHistory');if(!c)return;
  if(!returns.length){c.innerHTML='<div class="empty-state">لا توجد مرتجعات</div>';return;}
  let rows=returns.map(r=>`<tr><td>${r.date}</td><td>#${r.invoiceId}</td><td>${r.items.map(i=>`${i.name} ×${i.quantity}`).join('، ')}</td><td style="font-weight:700">${r.total.toLocaleString('ar-EG')} ج</td></tr>`).join('');
  c.innerHTML=`<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>الفاتورة</th><th>المنتجات</th><th>الإجمالي</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// INSTALLMENTS
// ============================================================
function openInstallmentSetup(inv){
  showModal(`
    <div class="modal-title">💳 إعداد التقسيط</div>
    <div style="margin-bottom:12px;color:var(--muted)">إجمالي الفاتورة: <strong style="color:var(--accent)">${inv.total.toLocaleString('ar-EG')} ج</strong></div>
    <div class="form-group" style="margin-bottom:12px"><label>الدفعة الأولى (لا تقل عن ربع المبلغ = ${(inv.total/4).toLocaleString('ar-EG')} ج)</label><input type="number" id="inst_down" min="${inv.total/4}" max="${inv.total}" value="${Math.ceil(inv.total/4)}" placeholder="${Math.ceil(inv.total/4)}"></div>
    <div class="form-group" style="margin-bottom:12px"><label>عدد الأقساط</label><input type="number" id="inst_count" min="1" max="24" value="3" placeholder="3"></div>
    <div class="form-group" style="margin-bottom:12px"><label>كل كم يوم قسط؟</label><input type="number" id="inst_days" min="7" value="30" placeholder="30"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="createInstallment(${inv.id})">✅ إنشاء</button>
    </div>`);
}
function createInstallment(invId){
  let inv=invoices.find(i=>i.id===invId);if(!inv)return;
  let down=parseFloat(document.getElementById('inst_down').value);
  let count=parseInt(document.getElementById('inst_count').value);
  let days=parseInt(document.getElementById('inst_days').value);
  let minDown=inv.total/4;
  if(isNaN(down)||down<minDown)return showToast(`❌ الدفعة الأولى لا تقل عن ${minDown.toLocaleString('ar-EG')} ج`,'error');
  if(down>inv.total)return showToast('❌ الدفعة أكبر من الإجمالي','error');
  if(isNaN(count)||count<1)return showToast('❌ عدد أقساط غير صحيح','error');
  let remaining=inv.total-down;
  let perInst=Math.ceil(remaining/count);
  let schedule=[{dueDate:new Date().toISOString().split('T')[0],amount:down,paid:true,paidDate:new Date().toLocaleString('ar-EG'),type:'down'}];
  for(let i=1;i<=count;i++){
    let d=new Date();d.setDate(d.getDate()+days*i);
    let amt=i===count?(remaining-(perInst*(count-1))):perInst;
    schedule.push({dueDate:d.toISOString().split('T')[0],amount:amt,paid:false,delayed:false,delayedUntil:null,type:'installment'});
  }
  installments.push({id:Date.now(),invoiceId:invId,serial:inv.serial,customerName:inv.customer,phone:inv.phone||'',total:inv.total,downPayment:down,remaining,schedule,status:'active',createdAt:new Date().toLocaleString('ar-EG')});
  saveAll();closeModal();showToast('✅ تم إنشاء خطة التقسيط');switchTab('installments');
}
function getLateInstallments(){
  let today=new Date();today.setHours(0,0,0,0);
  return installments.filter(inst=>{
    if(inst.status==='done')return false;
    return inst.schedule.some(s=>{if(s.paid||s.type==='down')return false;let d=new Date(s.dueDate);d.setHours(0,0,0,0);return d<today&&!s.delayed;});
  });
}
function getInstStatus(inst){
  let today=new Date();today.setHours(0,0,0,0);
  let hasLate=inst.schedule.some(s=>{if(s.paid||s.type==='down')return false;let d=new Date(s.dueDate);d.setHours(0,0,0,0);return d<today&&!s.delayed;});
  let hasDelayed=inst.schedule.some(s=>s.delayed&&!s.paid);
  if(inst.status==='done')return{label:'منتهي',cls:'status-done'};
  if(hasLate)return{label:'متأخر',cls:'status-late'};
  if(hasDelayed)return{label:'مؤجل',cls:'status-delayed'};
  return{label:'ملتزم',cls:'status-committed'};
}
function renderInstallmentsPage(){
  let html=`<div class="section"><div class="section-title">💳 نظام التقسيط</div>`;
  if(!installments.length){html+='<div class="empty-state">لا توجد خطط تقسيط</div></div>';document.getElementById('contentArea').innerHTML=html;return;}
  let rows=installments.map((inst,i)=>{
    let st=getInstStatus(inst);
    let paid=inst.schedule.filter(s=>s.paid).reduce((s,x)=>s+x.amount,0);
    let remaining=inst.total-paid;
    return`<tr>
      <td>${i+1}</td><td>${inst.customerName}</td><td>${inst.phone||'-'}</td>
      <td>${inst.total.toLocaleString('ar-EG')} ج</td>
      <td style="color:var(--green);font-weight:700">${paid.toLocaleString('ar-EG')} ج</td>
      <td style="color:var(--danger);font-weight:700">${remaining.toLocaleString('ar-EG')} ج</td>
      <td><span class="${st.cls}">${st.label}</span></td>
      <td><button class="btn btn-info btn-sm" onclick="viewInstallment(${inst.id})">تفاصيل</button></td>
    </tr>`;
  }).join('');
  html+=`<div class="tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>الهاتف</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  document.getElementById('contentArea').innerHTML=html;
}
function viewInstallment(id){
  let inst=installments.find(x=>x.id===id);if(!inst)return;
  let today=new Date();today.setHours(0,0,0,0);
  let rows=inst.schedule.map((s,i)=>{
    let due=new Date(s.dueDate);due.setHours(0,0,0,0);
    let isLate=!s.paid&&due<today&&!s.delayed;
    let status=s.paid?'<span class="status-done">مدفوع</span>':isLate?'<span class="status-late">متأخر</span>':s.delayed?'<span class="status-delayed">مؤجل</span>':'<span class="status-committed">قادم</span>';
    let actions='';
    if(!s.paid&&s.type!=='down'){
      actions+=`<button class="btn btn-success btn-sm" onclick="payInstallment(${id},${i})">✅ دفع</button> `;
      if(!s.delayed) actions+=`<button class="btn btn-warning btn-sm" onclick="delayInstallment(${id},${i})">⏰ تأجيل</button>`;
    }
    return`<tr><td>${s.type==='down'?'دفعة أولى':'قسط '+(i)}</td><td>${s.dueDate}</td><td style="font-weight:700">${s.amount.toLocaleString('ar-EG')} ج</td><td>${status}</td><td>${actions}</td></tr>`;
  }).join('');
  let paid=inst.schedule.filter(s=>s.paid).reduce((s,x)=>s+x.amount,0);
  showModal(`
    <div class="modal-title">💳 تفاصيل التقسيط — ${inst.customerName}</div>
    <div style="margin-bottom:12px;display:flex;gap:20px;flex-wrap:wrap;font-size:.88rem">
      <span>📞 ${inst.phone||'-'}</span>
      <span>💰 الإجمالي: <strong>${inst.total.toLocaleString('ar-EG')} ج</strong></span>
      <span style="color:var(--green)">✅ المدفوع: <strong>${paid.toLocaleString('ar-EG')} ج</strong></span>
      <span style="color:var(--danger)">⏳ المتبقي: <strong>${(inst.total-paid).toLocaleString('ar-EG')} ج</strong></span>
    </div>
    <div class="tbl-wrap"><table><thead><tr><th>القسط</th><th>تاريخ الاستحقاق</th><th>المبلغ</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إغلاق</button></div>`);
}
function payInstallment(instId,schedIdx){
  let inst=installments.find(x=>x.id===instId);if(!inst)return;
  inst.schedule[schedIdx].paid=true;inst.schedule[schedIdx].paidDate=new Date().toLocaleString('ar-EG');
  let allPaid=inst.schedule.every(s=>s.paid);if(allPaid)inst.status='done';
  saveAll();closeModal();viewInstallment(instId);showToast('✅ تم تسجيل الدفع');
  if(currentTab==='installments')renderInstallmentsPage();
}
function delayInstallment(instId,schedIdx){
  let inst=installments.find(x=>x.id===instId);if(!inst)return;
  let s=inst.schedule[schedIdx];
  if(s.delayed)return showToast('❌ تم التأجيل مسبقاً','error');
  let newDate=new Date(s.dueDate);newDate.setDate(newDate.getDate()+7);
  s.delayed=true;s.delayedUntil=newDate.toISOString().split('T')[0];s.dueDate=s.delayedUntil;
  saveAll();closeModal();viewInstallment(instId);showToast('✅ تم التأجيل أسبوع');
}

function addLogoToPDF(pdf,x,y,w,h){
  try{ pdf.addImage(LOGO_B64,'JPEG',x,y,w,h); }catch(e){}
}

function buildPDFHeader(pdf, title, subtitle) {
  var pageW = 210;

  // علامة مائية - لوجو كبير شفاف في المنتصف
  try {
    pdf.saveGraphicsState();
    pdf.setGState(new pdf.GState({opacity: 0.06}));
    pdf.addImage(LOGO_B64, 'JPEG', 55, 70, 100, 100);
    pdf.restoreGraphicsState();
  } catch(e) {}

  // لوجو واضح في الأعلى
  try {
    pdf.addImage(LOGO_B64, 'JPEG', pageW/2 - 17, 6, 34, 34);
  } catch(e) {}

  // اسم الشركة
  pdf.setFontSize(16);
  pdf.setFont('helvetica', 'bold');
  pdf.setTextColor(245, 158, 11);
  pdf.text('Badran CNC', pageW/2, 48, {align:'center'});

  // عنوان التقرير
  pdf.setFontSize(12);
  pdf.setFont('helvetica', 'bold');
  pdf.setTextColor(30, 41, 59);
  pdf.text(title || '', pageW/2, 57, {align:'center'});

  // العنوان الفرعي
  if (subtitle) {
    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(100, 116, 139);
    pdf.text(subtitle, pageW/2, 64, {align:'center'});
  }

  // خط فاصل
  pdf.setDrawColor(245, 158, 11);
  pdf.setLineWidth(0.8);
  pdf.line(10, 68, 200, 68);

  return 75;
}

function buildPDFFooter(pdf) {
  var pageH = pdf.internal.pageSize.height;
  pdf.setDrawColor(226, 232, 240);
  pdf.setLineWidth(0.3);
  pdf.line(10, pageH - 14, 200, pageH - 14);
  pdf.setFontSize(8);
  pdf.setFont('helvetica', 'normal');
  pdf.setTextColor(148, 163, 184);
  pdf.text('Badran CNC', pageW/2, pageH - 8, {align:'center'});
}

function buildPDFTable(pdf, headers, rows, startY) {
  var pageW = 210;
  var margin = 10;
  var tableW = pageW - margin * 2;
  var n = headers.length;
  var colW = [];

  // توزيع عرض الأعمدة
  if (n === 4)      colW = [70, 25, 45, 50];
  else if (n === 5) colW = [15, 60, 30, 40, 45];
  else if (n === 6) colW = [12, 52, 25, 30, 35, 36];
  else if (n === 7) colW = [10, 40, 28, 25, 25, 25, 27];
  else { var w = tableW / n; for(var k=0;k<n;k++) colW.push(w); }

  var y = startY;
  var rowH = 8;

  // هيدر الجدول
  pdf.setFillColor(254, 243, 199);
  pdf.setDrawColor(245, 158, 11);
  pdf.setLineWidth(0.3);
  pdf.rect(margin, y, tableW, rowH, 'FD');

  pdf.setFontSize(9);
  pdf.setFont('helvetica', 'bold');
  pdf.setTextColor(146, 64, 14);

  var cx = margin + tableW;
  for (var i = 0; i < headers.length; i++) {
    cx -= colW[i];
    pdf.text(String(headers[i] || ''), cx + colW[i]/2, y + 5.5, {align:'center'});
  }
  y += rowH;

  // صفوف البيانات
  pdf.setFont('helvetica', 'normal');
  for (var r = 0; r < rows.length; r++) {
    if (y > 272) {
      buildPDFFooter(pdf);
      pdf.addPage();
      y = 15;
    }
    // تلوين متناوب
    if (r % 2 === 0) pdf.setFillColor(255, 255, 255);
    else             pdf.setFillColor(248, 250, 252);
    pdf.rect(margin, y, tableW, rowH, 'F');
    pdf.setDrawColor(226, 232, 240);
    pdf.rect(margin, y, tableW, rowH, 'S');

    pdf.setFontSize(8.5);
    pdf.setTextColor(30, 41, 59);

    var rx = margin + tableW;
    for (var j = 0; j < rows[r].length; j++) {
      rx -= colW[j];
      var txt = String(rows[r][j] !== undefined ? rows[r][j] : '');
      pdf.text(txt, rx + colW[j]/2, y + 5.2, {align:'center'});
    }
    y += rowH;
  }
  return y + 4;
}

function printInvoicePDF(id) {
  var inv = invoices.find(function(i){ return i.id === id; });
  if (!inv) return;
  closeModal();
  showLoading();

  setTimeout(function() {
    try {
      var pdf = new window.jspdf.jsPDF({unit:'mm', format:'a4'});
      var pageW = 210;
      var y = buildPDFHeader(pdf, 'فاتورة مبيعات', '');

      // QR Code
      var qrContainer = document.createElement('div');
      qrContainer.style.cssText = 'position:absolute;top:-9999px;left:-9999px;background:white;padding:4px;';
      document.body.appendChild(qrContainer);
      try {
        if (typeof QRCode !== 'undefined') {
          new QRCode(qrContainer, {text: inv.serial || String(inv.id), width:80, height:80});
        }
      } catch(e) {}

      // انتظر QR يتولد
      setTimeout(function() {
        // رسم QR في الـ PDF
        try {
          var qrCanvas = qrContainer.querySelector('canvas');
          if (qrCanvas) {
            var qrData = qrCanvas.toDataURL('image/png');
            pdf.addImage(qrData, 'PNG', 10, y, 28, 28);
          }
        } catch(e) {}
        document.body.removeChild(qrContainer);

        // السيريال تحت QR
        pdf.setFontSize(7);
        pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(100, 116, 139);
        pdf.text(inv.serial || '', 24, y + 31, {align:'center'});

        // بيانات العميل
        pdf.setFontSize(10);
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(30, 41, 59);
        pdf.text('بيانات الفاتورة', 200, y + 6, {align:'right'});
        pdf.setFontSize(9);
        pdf.setFont('helvetica', 'normal');
        pdf.text('العميل: ' + inv.customer, 200, y + 13, {align:'right'});
        pdf.text('الهاتف: ' + (inv.phone || '-'), 200, y + 20, {align:'right'});
        pdf.text('التاريخ: ' + inv.date, 200, y + 27, {align:'right'});
        y += 36;

        // جدول المنتجات
        var rows = inv.items.map(function(it) {
          return [it.name, it.quantity, it.sellPrice.toLocaleString('ar-EG') + ' ج', it.total.toLocaleString('ar-EG') + ' ج'];
        });
        y = buildPDFTable(pdf, ['المنتج', 'الكمية', 'السعر', 'الإجمالي'], rows, y);

        // الإجمالي
        pdf.setFillColor(254, 243, 199);
        pdf.rect(120, y, 80, 10, 'F');
        pdf.setFontSize(12);
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(146, 64, 14);
        pdf.text('الإجمالي: ' + inv.total.toLocaleString('ar-EG') + ' ج', 196, y + 7, {align:'right'});
        y += 16;

        // شكر
        pdf.setFontSize(9);
        pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(100, 116, 139);
        pdf.text('شكراً لثقتكم بشركة Badran CNC', pageW/2, y + 6, {align:'center'});

        buildPDFFooter(pdf);
        pdf.save('فاتورة_' + (inv.serial || inv.id) + '.pdf');
        hideLoading();
      }, 300);

    } catch(e) {
      showToast('خطأ في PDF: ' + e.message, 'error');
      hideLoading();
    }
  }, 50);
}

function printDailySalesPDF() {
  var today = new Date().toLocaleDateString('ar-EG');
  var todayInv = invoices.filter(function(inv){ return inv.date && inv.date.startsWith(today); });
  if (!todayInv.length) return showToast('لا توجد مبيعات اليوم', 'error');
  showLoading();
  setTimeout(function() {
    try {
      var pdf = new window.jspdf.jsPDF({unit:'mm', format:'a4'});
      var total = todayInv.reduce(function(s,i){ return s+i.total; }, 0);
      var y = buildPDFHeader(pdf, 'تقرير مبيعات اليوم', 'التاريخ: ' + new Date().toLocaleString('ar-EG'));
      var rows = todayInv.map(function(inv, i) {
        return [i+1, inv.customer, inv.phone||'-', inv.serial||'-', inv.total.toLocaleString('ar-EG') + ' ج'];
      });
      y = buildPDFTable(pdf, ['#', 'العميل', 'الهاتف', 'السيريال', 'الإجمالي'], rows, y);
      pdf.setFillColor(254, 243, 199);
      pdf.rect(120, y, 80, 10, 'F');
      pdf.setFontSize(12); pdf.setFont('helvetica','bold'); pdf.setTextColor(146,64,14);
      pdf.text('إجمالي اليوم: ' + total.toLocaleString('ar-EG') + ' ج', 196, y+7, {align:'right'});
      buildPDFFooter(pdf);
      pdf.save('مبيعات_اليوم_' + today + '.pdf');
    } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
    hideLoading();
  }, 50);
}

function printShortagesPDF() {
  var low = products.filter(function(p){ return p.stock < LOW_STOCK; });
  if (!low.length) return showToast('لا توجد نواقص', 'error');
  showLoading();
  setTimeout(function() {
    try {
      var pdf = new window.jspdf.jsPDF({unit:'mm', format:'a4'});
      var y = buildPDFHeader(pdf, 'تقرير المنتجات الناقصة', 'الحد الادنى: ' + LOW_STOCK + ' | ' + new Date().toLocaleString('ar-EG'));
      var rows = low.map(function(p,i){
        return [i+1, p.name, p.stock, LOW_STOCK, p.sellPrice.toLocaleString('ar-EG') + ' ج'];
      });
      y = buildPDFTable(pdf, ['#', 'المنتج', 'الرصيد', 'الحد الادنى', 'سعر البيع'], rows, y);
      buildPDFFooter(pdf);
      pdf.save('تقرير_النواقص.pdf');
    } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
    hideLoading();
  }, 50);
}

function printDebtorsPDF(type) {
  var debtors = (window._debtorsData || []).filter(function(d){
    return type === 'late' ? d.statusObj.label === 'متأخر' : true;
  });
  if (!debtors.length) return showToast('لا توجد بيانات', 'error');
  showLoading();
  setTimeout(function() {
    try {
      var pdf = new window.jspdf.jsPDF({unit:'mm', format:'a4'});
      var title = type === 'late' ? 'تقرير العملاء المتأخرين' : 'تقرير جميع المديونين';
      var y = buildPDFHeader(pdf, title, new Date().toLocaleString('ar-EG'));
      var rows = debtors.map(function(d,i){
        return [i+1, d.customerName, d.phone||'-', d.total.toLocaleString('ar-EG')+' ج', d.paid.toLocaleString('ar-EG')+' ج', d.remaining.toLocaleString('ar-EG')+' ج', d.statusObj.label];
      });
      y = buildPDFTable(pdf, ['#','العميل','الهاتف','الإجمالي','المدفوع','المتبقي','الحالة'], rows, y);
      buildPDFFooter(pdf);
      pdf.save(title + '.pdf');
    } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
    hideLoading();
  }, 50);
}

function printInventoryPDF() {
  showLoading();
  setTimeout(function() {
    try {
      var pdf = new window.jspdf.jsPDF({unit:'mm', format:'a4'});
      var loc = _activeLocFilter || 'all';
      var titles = {all:'جرد جميع المنتجات', shop:'جرد منتجات المحل', warehouse:'جرد منتجات المخزن'};
      var y = buildPDFHeader(pdf, titles[loc] || 'جرد المنتجات', 'التاريخ: ' + new Date().toLocaleString('ar-EG'));

      // إحصائيات
      var totalWH = products.reduce(function(s,p){ return s+(p.warehouse||0); }, 0);
      var totalSH = products.reduce(function(s,p){ return s+(p.shop||0); }, 0);
      var lowCount = products.filter(function(p){ return (p.warehouse||0)+(p.shop||0) < LOW_STOCK; }).length;
      pdf.setFillColor(254,243,199); pdf.rect(10,y,190,10,'F');
      pdf.setFontSize(9); pdf.setFont('helvetica','bold'); pdf.setTextColor(146,64,14);
      pdf.text('المنتجات: ' + products.length, 195, y+7, {align:'right'});
      pdf.text('المخزن: ' + totalWH, 155, y+7, {align:'right'});
      pdf.text('المحل: ' + totalSH, 115, y+7, {align:'right'});
      pdf.text('ناقص: ' + lowCount, 75, y+7, {align:'right'});
      y += 14;

      var list = products.filter(function(p){
        if (loc === 'warehouse') return (p.warehouse||0) > 0;
        return true;
      });
      var rows = list.map(function(p,i){
        var wh=p.warehouse||0, sh=p.shop||0, total=wh+sh;
        var status = total===0 ? 'نفد' : total<LOW_STOCK ? 'ناقص' : 'متوفر';
        if (loc==='shop') status = sh>0 ? 'بالمحل' : wh>0 ? 'بالمخزن' : 'نفد';
        return [i+1, p.name, p.sellPrice.toLocaleString('ar-EG')+' ج', wh, sh, total, status];
      });
      y = buildPDFTable(pdf, ['#','المنتج','سعر البيع','المخزن','المحل','الإجمالي','الحالة'], rows, y);
      buildPDFFooter(pdf);
      pdf.save((titles[loc]||'جرد') + '.pdf');
    } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
    hideLoading();
  }, 50);
}
