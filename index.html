<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXON - \u0646\u0638\u0627\u0645 \u0625\u062f\u0627\u0631\u0629 \u0627\u0644\u0645\u0628\u064a\u0639\u0627\u062a</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f17;
  --surface: #16161f;
  --card: #1e1e2e;
  --border: #2a2a3e;
  --accent: #f39c12;
  --accent2: #e74c3c;
  --green: #2ecc71;
  --blue: #3498db;
  --purple: #9b59b6;
  --text: #e8e8f0;
  --muted: #7f8c9a;
  --danger: #e74c3c;
  --gold: #f1c40f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); direction:rtl; min-height:100vh; }

/* ===== LOGIN ===== */
#loginScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:50px 40px; width:360px; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-box h1 { font-size:2.5rem; font-weight:900; color:var(--accent); letter-spacing:3px; }
.login-box p { color:var(--muted); margin:6px 0 30px; }
.login-box input {
  width:100%; padding:14px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-family:'Cairo',sans-serif; font-size:.95rem;
  text-align:center; outline:none; transition:.2s;
}
.login-box input:focus { border-color:var(--accent); }
.login-box button {
  width:100%; padding:14px; margin-top:14px; background:var(--accent);
  border:none; border-radius:10px; font-family:'Cairo',sans-serif;
  font-size:1rem; font-weight:700; cursor:pointer; color:#111; transition:.2s;
}
.login-box button:hover { background:#e08e0b; }
.login-err { color:var(--danger); margin-top:12px; font-size:.9rem; }

/* ===== MAIN APP ===== */
#app { display:none; flex-direction:column; min-height:100vh; }

/* TOPBAR */
.topbar {
  background:var(--card); border-bottom:1px solid var(--border);
  padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.topbar-logo { font-size:1.4rem; font-weight:900; color:var(--accent); letter-spacing:2px; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.badge-role {
  padding:4px 12px; border-radius:20px; font-size:.8rem; font-weight:700;
  background:rgba(243,156,18,.15); color:var(--accent); border:1px solid rgba(243,156,18,.3);
}
.topbar-date { color:var(--muted); font-size:.85rem; }
.btn-logout {
  background:transparent; border:1px solid var(--border); color:var(--muted);
  padding:6px 14px; border-radius:8px; cursor:pointer; font-family:'Cairo',sans-serif; font-size:.85rem;
  transition:.2s;
}
.btn-logout:hover { border-color:var(--danger); color:var(--danger); }

/* NAV TABS */
.navtabs {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; gap:4px; padding:8px 24px; overflow-x:auto;
}
.navtab {
  padding:8px 18px; border-radius:8px; cursor:pointer; font-family:'Cairo',sans-serif;
  font-size:.9rem; font-weight:600; color:var(--muted); border:none; background:transparent;
  transition:.2s; white-space:nowrap;
}
.navtab:hover { color:var(--text); background:var(--border); }
.navtab.active { background:var(--accent); color:#111; }
.navtab.admin-only { border-left:2px solid var(--danger); }

/* CONTENT */
.content { flex:1; padding:24px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* CARDS */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:20px; text-align:center;
}
.stat-card .stat-val { font-size:1.6rem; font-weight:900; margin:6px 0 4px; }
.stat-card .stat-lbl { color:var(--muted); font-size:.85rem; }
.stat-card.green .stat-val { color:var(--green); }
.stat-card.orange .stat-val { color:var(--accent); }
.stat-card.blue .stat-val { color:var(--blue); }
.stat-card.red .stat-val { color:var(--danger); }
.stat-card.gold .stat-val { color:var(--gold); }

/* SECTION */
.section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
.section-title { font-size:1rem; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.section-title span { font-size:1.1rem; }

/* FORMS */
.form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group label { font-size:.82rem; color:var(--muted); font-weight:600; }
.form-group input, .form-group select, .form-group textarea {
  padding:10px 12px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'Cairo',sans-serif; font-size:.9rem; outline:none; transition:.2s;
}
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }
.form-group select option { background:var(--card); }

/* BUTTONS */
.btn { padding:10px 20px; border-radius:8px; font-family:'Cairo',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer; border:none; transition:.2s; }
.btn-primary { background:var(--accent); color:#111; }
.btn-primary:hover { background:#e08e0b; }
.btn-success { background:var(--green); color:#111; }
.btn-success:hover { background:#27ae60; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#c0392b; }
.btn-info { background:var(--blue); color:#fff; }
.btn-info:hover { background:#2980b9; }
.btn-sm { padding:5px 12px; font-size:.8rem; }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }

/* TABLE */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.88rem; }
th { background:var(--surface); padding:10px 12px; text-align:right; color:var(--muted); font-weight:700; border-bottom:2px solid var(--border); }
td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:hover td { background:rgba(255,255,255,.02); }
.tag {
  display:inline-block; padding:2px 10px; border-radius:20px; font-size:.78rem; font-weight:700;
}
.tag-green { background:rgba(46,204,113,.15); color:var(--green); }
.tag-red { background:rgba(231,76,60,.15); color:var(--danger); }
.tag-orange { background:rgba(243,156,18,.15); color:var(--accent); }
.tag-blue { background:rgba(52,152,219,.15); color:var(--blue); }

/* INVOICE BUILDER */
#invItems { margin:12px 0; }
.inv-item-row {
  display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:8px;
  margin-bottom:8px; align-items:center;
}
.inv-item-row input, .inv-item-row select {
  padding:8px 10px; background:var(--surface); border:1px solid var(--border);
  border-radius:7px; color:var(--text); font-family:'Cairo',sans-serif; font-size:.87rem; outline:none;
}
.inv-item-row input:focus { border-color:var(--accent); }
.inv-total-box {
  background:var(--surface); border-radius:10px; padding:14px 18px;
  display:flex; justify-content:flex-end; gap:30px; align-items:center;
}
.inv-total-box .lbl { color:var(--muted); font-size:.9rem; }
.inv-total-box .val { font-size:1.2rem; font-weight:900; color:var(--accent); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:flex; align-items:center; justify-content:center; z-index:500;
  opacity:0; pointer-events:none; transition:.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:28px; width:min(680px,95vw); max-height:90vh; overflow-y:auto;
}
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-header h3 { font-size:1.1rem; font-weight:700; }
.modal-close { background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state div { font-size:2.5rem; margin-bottom:10px; }

/* INVOICE PRINT */
.inv-print-box {
  background:#fff; color:#111; padding:30px; border-radius:12px;
  font-family:'Cairo',sans-serif; direction:rtl; max-width:600px; margin:0 auto;
}
.inv-print-box h2 { text-align:center; font-size:1.6rem; color:#f39c12; margin-bottom:4px; }
